<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#025857">
<title>Feed Your Health — Το πλάνο μου</title>
<!-- PWA / add-to-home-screen -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Το πλάνο μου">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' rx='40' fill='%23025857'/%3E%3Ctext x='90' y='118' font-family='Georgia,serif' font-size='84' font-weight='700' fill='%23E2EEE5' text-anchor='middle'%3EFY%3C/text%3E%3C/svg%3E">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' rx='40' fill='%23025857'/%3E%3Ctext x='90' y='120' font-family='Georgia,serif' font-size='86' font-weight='700' fill='%23E2EEE5' text-anchor='middle'%3EFY%3C/text%3E%3C/svg%3E">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --teal:#025857; --teal-d:#014545; --teal-l:#037070;
    --tint:#E2EEE5; --tint2:#E8F5E9; --bord:#c5ddd8; --bord-l:#eef4f2;
    --ink:#1a3330; --muted:#5a8a82; --faint:#9fb5b0; --ok:#2e7d32;
    --bg:#f4f8f6; --card:#ffffff;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--ink);font-size:16px;line-height:1.5}
  #app{max-width:480px;margin:0 auto;min-height:100vh;background:var(--bg);display:flex;flex-direction:column;position:relative}

  .hdr{background:var(--teal);color:#fff;padding:18px 18px 16px;position:sticky;top:0;z-index:20}
  .hdr-top{display:flex;align-items:center;justify-content:space-between}
  .brand{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--tint);letter-spacing:.3px}
  .brand-logo{width:26px;height:26px;border-radius:50%;background:var(--tint);display:flex;align-items:center;justify-content:center;color:var(--teal);font-weight:700;font-size:14px}
  .hdr h1{font-size:21px;font-weight:600;margin:12px 0 2px}
  .hdr .sub{font-size:13px;color:#9fcabf}

  .scroll{flex:1;overflow-y:auto;padding:14px 14px 90px}
  .view{display:none;flex-direction:column;gap:12px}
  .view.active{display:flex}

  .card{background:var(--card);border:.5px solid var(--bord);border-radius:14px;overflow:hidden}
  .card-pad{padding:12px 14px}
  .card-hdr{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:600;color:var(--teal-d);margin-bottom:10px}
  .card-hdr i,.ic{color:var(--teal)}

  .stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
  .stats-4{grid-template-columns:1fr 1fr 1fr 1fr}
  .stat{background:var(--tint2);border-radius:12px;padding:10px 6px;text-align:center}
  .stat .l{font-size:12px;color:var(--teal-l)}
  .stat .v{font-size:18px;font-weight:600;color:var(--teal-d)}
  .stat .u{font-size:11px;color:var(--muted)}
  .stat .u.ok{color:var(--ok)}

  .meal{display:flex;gap:10px;padding:9px 0;border-bottom:.5px solid var(--bord-l)}
  .meal:last-child{border-bottom:none}
  .meal .t{font-size:12px;color:var(--faint);width:42px;flex-shrink:0;padding-top:1px}
  .meal .nm{font-size:14px;color:var(--ink)}
  .meal .mi{font-size:12px;color:var(--muted)}
  .meal .mc{width:23px;height:23px;border:1.5px solid var(--bord);border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;cursor:pointer;transition:transform .1s;margin-top:1px}
  .meal .mc:active{transform:scale(.85)}
  .meal.eaten .mc{background:var(--teal);border-color:var(--teal)}
  .meal.eaten .nm{color:var(--faint);text-decoration:line-through}
  .food{display:flex;justify-content:space-between;padding:8px 0;border-bottom:.5px solid var(--bord-l);font-size:13px}
  .food:last-child{border-bottom:none}
  .food .q{font-weight:600;color:var(--teal)}

  .swap-btn{width:100%;display:flex;align-items:center;justify-content:space-between;background:none;border:.5px solid var(--bord);border-radius:10px;padding:8px 12px;font-size:13px;color:var(--teal);margin-top:8px;cursor:pointer;font-family:inherit}
  .swap-btn i{font-size:16px;transition:transform .15s}
  .swap-btn.open i.chev{transform:rotate(180deg)}
  .swap-list{display:none;flex-direction:column;gap:8px;margin-top:8px}
  .swap-list.open{display:flex}
  .swap-item{display:flex;flex-direction:column;gap:1px;padding:8px 10px;background:var(--tint2);border-radius:10px}
  .swap-item .nm{font-size:13px;font-weight:600;color:var(--teal-d)}
  .swap-item .fd{font-size:12px;color:var(--muted)}
  .swap-note{font-size:11px;color:var(--faint);margin-top:8px}

  .log-inp{width:100%;border:.5px solid var(--bord);border-radius:10px;padding:9px 11px;font-size:14px;font-family:inherit;color:var(--ink);background:#fff;box-sizing:border-box}
  .log-inp:focus{outline:none;border-color:var(--teal-l)}
  textarea.log-inp{resize:vertical;min-height:54px}
  .log-sent{font-size:12px;color:var(--ok);display:flex;align-items:center;gap:6px;margin-bottom:8px}

  .water{background:var(--tint);border-radius:14px;padding:12px 14px}
  .glasses{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
  .glass{font-size:30px;color:var(--faint);cursor:pointer;line-height:1;transition:transform .1s}
  .glass.on{color:var(--teal)}
  .glass:active{transform:scale(.85)}

  .quick{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .quick .card-pad{cursor:pointer}
  .quick .qt{font-size:13px;font-weight:600;color:var(--teal-d);margin-top:6px}
  .quick .qs{font-size:12px;color:var(--muted)}

  .daypills{display:flex;gap:6px;overflow-x:auto;padding-bottom:6px;-webkit-overflow-scrolling:touch}
  .daypills::-webkit-scrollbar{display:none}
  .pill{flex:0 0 auto;padding:7px 13px;border-radius:999px;background:var(--card);border:.5px solid var(--bord);font-size:12px;color:var(--muted);cursor:pointer}
  .pill.on{background:var(--teal);color:#fff;border-color:var(--teal)}

  .slcat{margin-bottom:12px}
  .slcat-h{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);margin-bottom:6px}
  .slrow{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:.5px solid var(--bord-l);cursor:pointer}
  .slrow:last-child{border-bottom:none}
  .slrow .chk{width:20px;height:20px;border:1.5px solid var(--bord);border-radius:5px;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px}
  .slrow.done .chk{background:var(--teal);border-color:var(--teal)}
  .slrow.done .nm{color:var(--faint);text-decoration:line-through}
  .slrow .nm{flex:1;font-size:13px}
  .slrow .amt{font-size:12px;color:var(--teal);font-weight:600}
  .slrow .amt .raw{color:var(--muted);font-weight:400;font-size:11px}

  .prog{height:6px;background:#fff;border-radius:999px;margin-top:10px;overflow:hidden}
  .prog>div{height:100%;background:var(--teal);transition:width .25s}

  /* updated badge in header */
  .upd{display:inline-flex;align-items:center;gap:5px;margin-top:8px;font-size:11px;color:#9fcabf;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);padding:3px 9px;border-radius:999px}
  .upd i{font-size:13px}

  /* personal note from the dietitian */
  .note-coach{background:linear-gradient(135deg,var(--tint2),#fff);border:.5px solid var(--bord);border-left:3px solid var(--teal);border-radius:14px;padding:12px 14px}
  .note-coach .nh{display:flex;align-items:center;gap:7px;font-size:12px;font-weight:700;color:var(--teal-d);margin-bottom:5px}
  .note-coach .nb{font-size:13.5px;color:var(--ink);line-height:1.55;white-space:pre-wrap}

  /* small legend line */
  .legend{font-size:11px;color:var(--faint);padding:2px 2px 0;line-height:1.4}

  /* supplement daily check-off */
  .supp{padding:12px 0;border-bottom:.5px solid var(--bord-l)}
  .supp:last-child{border-bottom:none}
  .supp .sh{display:flex;justify-content:space-between;align-items:baseline;gap:8px}
  .supp .sn{font-size:14px;font-weight:600;color:var(--ink)}
  .supp .sd{font-size:12px;color:var(--teal);font-weight:600;white-space:nowrap}
  .supp .stm{font-size:11px;color:var(--faint);margin-top:1px}
  .supp .days{display:flex;gap:5px;margin-top:10px}
  .supp .day{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer}
  .supp .day .dn{font-size:10px;color:var(--faint)}
  .supp .day .dc{width:27px;height:27px;border-radius:50%;border:1.5px solid var(--bord);display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;transition:transform .1s}
  .supp .day.on .dc{background:var(--teal);border-color:var(--teal)}
  .supp .day.today .dn{color:var(--teal);font-weight:700}
  .supp .day.today .dc{border-color:var(--teal-l);box-shadow:0 0 0 2px var(--tint)}
  .supp .day:active .dc{transform:scale(.85)}

  /* contact dietitian — floating button + sheet */
  .fab{position:fixed;right:16px;bottom:74px;z-index:30;background:var(--teal);color:#fff;border:none;border-radius:999px;padding:11px 16px;font-size:13px;font-weight:600;display:flex;align-items:center;gap:7px;box-shadow:0 6px 18px rgba(2,88,87,.4);cursor:pointer}
  .fab i{font-size:18px}
  .fab:active{transform:scale(.96)}
  .sheet-bg{position:fixed;inset:0;background:rgba(2,40,38,.45);z-index:40;display:flex;align-items:flex-end;justify-content:center}
  .sheet{background:var(--card);width:100%;max-width:480px;border-radius:18px 18px 0 0;padding:18px 18px 26px;animation:up .2s ease}
  @keyframes up{from{transform:translateY(30px);opacity:.4}to{transform:translateY(0);opacity:1}}
  .sheet h3{margin:0 0 4px;font-size:16px;color:var(--teal-d)}
  .sheet .ssub{font-size:12px;color:var(--muted);margin-bottom:14px}
  .sheet a.opt{display:flex;align-items:center;gap:11px;text-decoration:none;color:var(--ink);padding:12px 12px;border:.5px solid var(--bord);border-radius:12px;margin-bottom:9px;font-size:14px;font-weight:600}
  .sheet a.opt i{font-size:20px;width:24px;text-align:center}
  .sheet a.wa{color:#0e8a4f}.sheet a.tel{color:var(--teal)}.sheet a.mail{color:#b25b00}.sheet a.web{color:#1565C0}
  .sheet .close{width:100%;background:var(--tint);border:none;border-radius:12px;padding:11px;font-size:13px;color:var(--teal-d);font-weight:600;cursor:pointer;margin-top:4px}
  @media (min-width:880px){
    .fab{bottom:24px}
    .sheet-bg{align-items:center}
    .sheet{border-radius:18px;max-width:400px}
  }

  .nav{position:fixed;bottom:0;left:0;right:0;max-width:480px;margin:0 auto;display:flex;justify-content:space-around;padding:9px 4px;border-top:.5px solid var(--bord);background:#fafdfc;z-index:20}
  .nav button{background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:2px;color:var(--faint);font-size:10px;cursor:pointer;flex:1;padding:2px}
  .nav button{font-size:11px}
  .nav button i{font-size:21px}
  .nav button.on{color:var(--teal);font-weight:600}

  .center{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:30px;text-align:center;color:var(--muted)}
  .spin{width:34px;height:34px;border:3px solid var(--bord);border-top-color:var(--teal);border-radius:50%;animation:sp 1s linear infinite}
  @keyframes sp{to{transform:rotate(360deg)}}
  .empty-glass-note{font-size:11px;color:var(--muted);margin-top:8px}
  table{border-collapse:collapse;width:100%}
  .stbl td{padding:6px 0;font-size:13px;border-bottom:.5px solid var(--bord-l)}
  .stbl tr:last-child td{border-bottom:none}
  .stbl .lab{color:var(--muted)}
  .stbl .val{text-align:right;font-weight:600;color:var(--teal)}

  /* header print button */
  .hdr-btn{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.35);color:#fff;font-size:12px;font-weight:600;padding:6px 11px;border-radius:999px;cursor:pointer;display:flex;align-items:center;gap:5px}
  .hdr-btn:active{transform:scale(.95)}
  .hdr-btn i{font-size:15px}

  /* plan grid wrapper (1 col mobile) */
  .plan-grid{display:flex;flex-direction:column;gap:12px}

  /* ───────── DESKTOP / LAPTOP ───────── */
  @media (min-width:880px){
    body{padding:26px 0}
    #app{max-width:1000px;min-height:calc(100vh - 52px);background:var(--card);border-radius:20px;box-shadow:0 10px 50px rgba(2,88,87,.14);overflow:hidden}
    .hdr{padding:24px 30px 20px}
    .hdr h1{font-size:27px;margin-top:14px}
    .hdr .sub{font-size:14px}
    .brand{font-size:14px}
    /* nav becomes a top horizontal bar */
    .nav{position:static;max-width:none;margin:0;order:1;border-top:none;border-bottom:.5px solid var(--bord);background:#fafdfc;justify-content:flex-start;gap:2px;padding:0 18px}
    .nav button{flex:0 0 auto;flex-direction:row;gap:7px;font-size:13.5px;padding:14px 18px;border-bottom:3px solid transparent}
    .nav button i{font-size:18px}
    .nav button.on{border-bottom-color:var(--teal)}
    .scroll{order:2;padding:24px 30px 44px}
    .view{gap:14px}
    /* use the width: meals & quick cards in columns */
    .plan-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;align-items:start}
    .quick{grid-template-columns:1fr 1fr 1fr}
    .daypills{flex-wrap:wrap;overflow:visible}
    .pill{font-size:13px;padding:8px 16px}
  }
  @media (min-width:1180px){
    .plan-grid{grid-template-columns:1fr 1fr 1fr}
  }

  /* ───────── PRINT / PDF (ίδια μορφή με το PDF της εφαρμογής) ───────── */
  #printable{display:none}
  @media print{
    @page{size:A4 landscape;margin:8mm}
    html,body{background:#fff!important}
    #app,.nav,.hdr-btn{display:none!important}
    #printable{display:block!important;color:#1a1a1a;font-family:'Century Gothic','Trebuchet MS',sans-serif;font-size:6pt;print-color-adjust:exact;-webkit-print-color-adjust:exact}
    #printable *{print-color-adjust:exact;-webkit-print-color-adjust:exact;box-sizing:border-box}
    .ph{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:5px;padding-bottom:4px;border-bottom:2px solid #025857}
    .ph-l{display:flex;flex-direction:column;align-items:flex-start;gap:2px}
    .ph-logo{width:42px;height:42px;border-radius:8px;background:#e5e5e5;color:#025857;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:18px;font-family:Georgia,serif}
    .ph-url{font-size:5pt;font-weight:700;color:#008080;letter-spacing:.5px;margin-top:1px}
    .ph-r{text-align:right}
    .ph-name{font-size:10.5pt;font-weight:700;color:#025857;line-height:1.2}
    .ph-tgt{font-size:6.5pt;font-weight:700;color:#025857;margin-top:2px}
    .ph-hyd{font-size:5.5pt;color:#1565C0;margin-top:1px}
    table.pmt{border-collapse:separate;border-spacing:0;width:100%;table-layout:fixed;margin-bottom:5px}
    table.pmt th{padding:4px 3px;font-size:6.5pt;font-weight:900;border:1px solid #c5ddd8;text-align:center;vertical-align:middle}
    th.pmt-corner{background:#025857;color:#fff;text-align:left;padding-left:5px;width:58px}
    table.pmt th.pday{background:linear-gradient(160deg,#025857,#037a7a);color:#fff}
    .ptb{background:#c8e6c9;color:#1b5e20;border-radius:3px;padding:0 2px;font-size:4.5pt;margin-left:2px}
    td.pmlbl{padding:3px 5px;vertical-align:middle;text-align:center;white-space:nowrap;border:1px solid #c5ddd8;font-size:6.5pt;font-weight:800}
    tr.m-b td.pmlbl{background:linear-gradient(90deg,#FFF3E0,#FFF9F5);border-left:3px solid #FF9800;color:#E65100}
    tr.m-l td.pmlbl{background:linear-gradient(90deg,#E8F5E9,#F2FAF2);border-left:3px solid #43A047;color:#2E7D32}
    tr.m-d td.pmlbl{background:linear-gradient(90deg,#E3F2FD,#EEF6FD);border-left:3px solid #1E88E5;color:#1565C0}
    tr.m-s td.pmlbl{background:linear-gradient(90deg,#FFFDE7,#FEFEF5);border-left:3px solid #F9A825;color:#F57F17}
    td.pdcell{padding:2px 3px;vertical-align:top;border:1px solid #dde8e6;font-size:6pt}
    tr.m-b td.pdcell{background:#FFFAF5}
    tr.m-l td.pdcell{background:#F7FBF7}
    tr.m-d td.pdcell{background:#F5F9FF}
    tr.m-s td.pdcell{background:#FFFEF0}
    .pfr{line-height:1.22}
    .pfn{color:#1a1a1a;font-weight:700}
    .pfg{color:#025857;font-weight:700}
    .pfh{color:#000;font-size:5pt;font-weight:400;margin-left:1px}
    .pmk{font-size:5pt;color:#555;border-top:1px dotted #aac7bf;margin-top:2px;padding-top:1px}
    tr.pmac td{background:#f5faf9;border:1px solid #c5ddd8;border-top:2px solid #025857;padding:3px 4px;font-size:5.5pt;text-align:center;color:#025857}
    td.pmac-lbl{background:#e8f5f4;font-weight:700}
    .psec{font-size:9.5pt;font-weight:700;color:#025857;margin:10px 0 4px;padding-bottom:3px;border-bottom:2px solid #025857;break-after:avoid}
    table.pst{border-collapse:collapse;width:100%;margin-bottom:8px}
    table.pst th{background:#025857;color:#fff;padding:3px 8px;font-size:6.5pt;text-align:left;border:1px solid #013f3f}
    table.pst td{padding:3px 8px;border:1px solid #c5ddd8;font-size:6.5pt;vertical-align:middle}
    table.pst tr.alt td{background:#E2EEE5}
    .pst-t{font-weight:700;color:#025857;width:26%}
    .pshop{break-before:page;page-break-before:always;padding-top:4mm}
    .psl2{width:100%;border-collapse:collapse;table-layout:fixed}
    .pslcol{width:50%;vertical-align:top}
    .pslcol:first-child{padding-right:6px}.pslcol:last-child{padding-left:6px}
    .pslcards{display:flex;flex-direction:column;gap:7px}
    .pslcard{border:1px solid #b2d8d8;border-radius:7px;overflow:hidden;break-inside:avoid;page-break-inside:avoid}
    .pslcard-h{background:#025857;color:#fff;padding:4px 10px;font-size:7pt;font-weight:700}
    .pslrow{display:flex;align-items:baseline;padding:3px 9px;font-size:6.3pt;border-bottom:1px dotted #daeee9;gap:4px}
    .pslrow:last-child{border-bottom:none}
    .pslrow.alt{background:#f5fbf9}
    .pslchk{color:#c5ddd8;font-size:7.5pt}
    .pslnm{flex:1;font-weight:600;color:#1a1a1a}
    .pslamt{font-weight:700;color:#025857;white-space:nowrap;font-size:7pt}
    .psllbl{font-size:5pt;color:#77a;font-weight:400;margin-left:2px}
    .pfoot{margin-top:8px;padding-top:4px;border-top:1px solid #c5ddd8;font-size:5.5pt;color:#025857;text-align:center}
  }
</style>

    <div class="spin"></div>

<script>
const SUPABASE_URL='https://vqmzrmotdqqoswlgfgrn.supabase.co';
const SUPABASE_KEY='sb_publishable_qnxqf2mg_yxMitIjQ5iaAA__Obnd_z1';

function lk(key){return 'fyh_portal_'+(token()||'x')+'_'+key}
function todayKey(){return dKey(new Date())}
function getWater(){try{const d=JSON.parse(localStorage.getItem(lk('water'))||'{}');return d[todayKey()]||0}catch(e){return 0}}

function setMeals(o){try{const d=JSON.parse(localStorage.getItem(lk('meals'))||'{}');d[todayKey()]=o;localStorage.setItem(lk('meals'),JSON.stringify(d))}catch(e){}}
// supplement adherence: { 'YYYY-MM-DD': { '<supp name>': true } }
function getSuppLog(){try{return JSON.parse(localStorage.getItem(lk('supps'))||'{}')}catch(e){return {}}}

function setClientLogToday(o){try{const d=getClientLog();d[todayKey()]=o;localStorage.setItem(lk('clientlog'),JSON.stringify(d))}catch(e){}}
function dKey(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function weekDates(){ // Δευτέρα → Κυριακή της τρέχουσας εβδομάδας
  const now=new Date(); const js=now.getDay(); const toMon=(js===0?-6:1-js);
  const mon=new Date(now); mon.setDate(now.getDate()+toMon); mon.setHours(0,0,0,0);
  const arr=[]; for(let i=0;i<7;i++){const d=new Date(mon);d.setDate(mon.getDate()+i);arr.push(d);} return arr;
}
// Στέλνει σήμερα's σύνοψη adherence στο Supabase (checkins table) ώστε ο διαιτολόγος να τη δει.
// Best-effort: αν αποτύχει (offline κτλ) δεν πειράζει, τα localStorage δεδομένα μένουν πάντα η πηγή αλήθειας.
function pushCheckin(){
  if(!sb || !SNAP)return;
  const tok=token(); if(!tok)return;
  try{
    const pd=planForDate(new Date()); if(!pd)return;
    const s=SNAP, h=s.hydration||{}, per=h.glassMl||250;
    const mealsN=(pd.meals||[]).length;
    const eaten=getMeals(); let mDone=0; for(let j=0;j<mealsN;j++)if(eaten[j])mDone++;
    const supCount=(s.supps||[]).length;
    const todK=dKey(new Date());
    const suppDay=(getSuppLog()[todK])||{};
    let sDone=0; (s.supps||[]).forEach(su=>{if(suppDay[su.name])sDone++;});
    const goalMl=(pd.isTrain&&h.trainMl)?h.trainMl:(h.baseMl||2000);
    const waterGoal=Math.max(6,Math.round(goalMl/per));
    sb.rpc('submit_checkin',{
      p_token:tok, p_date:todK,
      p_meals_done:mDone, p_meals_total:mealsN,
      p_water_glasses:getWater(), p_water_goal:waterGoal,
      p_supps_done:sDone, p_supps_total:supCount
    }).then(()=>{}).catch(()=>{});
  }catch(e){}
}

// Ο πελάτης καταγράφει μόνος του βάρος/σημείωση από το Πρόοδος tab (write-only, χωρίς login).
function submitClientLog(){
  const wEl=$('#log-weight'), nEl=$('#log-note');
  const w=wEl&&wEl.value?parseFloat(wEl.value):null;
  const n=nEl&&nEl.value?nEl.value.trim():'';
  if(!w && !n)return;
  const tok=token(), todK=dKey(new Date());
  if(sb && tok){
    sb.rpc('submit_client_log',{p_token:tok,p_date:todK,p_weight_kg:w,p_note:n||null}).then(()=>{}).catch(()=>{});
  }
  setClientLogToday({w:w,n:n});
  if(w){
    SNAP.progress=SNAP.progress||{};
    const log=SNAP.progress.log=SNAP.progress.log||[];
    const idx=log.findIndex(e=>e.date===todK);
    if(idx>-1)log[idx]=Object.assign({},log[idx],{kg:w}); else log.push({date:todK,kg:w});
    log.sort((a,b)=>a.date<b.date?-1:1);
    SNAP.progress.current=w;
    if(!SNAP.progress.start)SNAP.progress.start=w;
  }
  go('prog');
}

async function boot(){
  const t=token();
  if(!t){return fail('Λείπει ο σύνδεσμος του πλάνου.','Ζήτησε από τον διαιτολόγο σου το σωστό link.')}
  try{
    sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
    const {data,error}=await sb.rpc('get_shared_plan',{p_token:t}).single();
    if(error||!data){return fail('Το πλάνο δεν βρέθηκε.','Μπορεί να έληξε ή να αποσύρθηκε. Ζήτησε νέο link από τον διαιτολόγο σου.')}
    if(data.expires_at && new Date(data.expires_at)<new Date()){return fail('Ο σύνδεσμος έληξε.','Ζήτησε από τον διαιτολόγο σου να στείλει νέο link.')}
    SNAP=data.snapshot; SNAP._updated=data.updated_at;
    render();
  }catch(e){fail('Πρόβλημα σύνδεσης.',e.message||'Δοκίμασε ξανά σε λίγο.')}
}

// Δείχνει πότε ενημερώθηκε τελευταία φορά το πλάνο.
function updatedBadge(){
  const iso=SNAP&&(SNAP._updated||SNAP.publishedAt);
  if(!iso)return '';

}

// PWA: manifest που κρατάει το token (ώστε το «Πρόσθεσε στην οθόνη» να ανοίγει το σωστό πλάνο).
function injectManifest(){
  try{
    const name=((SNAP&&SNAP.name||'').split(' ')[0])||'';
    const m={name:'Feed Your Health — Το πλάνο μου',short_name:name?('Πλάνο '+name):'Το πλάνο μου',
      start_url:location.href,display:'standalone',background_color:'#f4f8f6',theme_color:'#025857',
      icons:[{src:"data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' rx='40' fill='%23025857'/%3E%3Ctext x='90' y='120' font-family='Georgia,serif' font-size='86' font-weight='700' fill='%23E2EEE5' text-anchor='middle'%3EFY%3C/text%3E%3C/svg%3E",sizes:'180x180',type:'image/svg+xml',purpose:'any maskable'}]};
    const blob=new Blob([JSON.stringify(m)],{type:'application/manifest+json'});
    const old=document.querySelector('link[rel="manifest"]'); if(old)old.remove();
    const link=document.createElement('link'); link.rel='manifest'; link.href=URL.createObjectURL(blob);
    document.head.appendChild(link);
  }catch(e){}
}

function statBox(l,v,u){const ok=/^[−-]/.test(u);return '<div class="stat"><div class="l">'+l+'</div><div class="v">'+v+'</div><div class="u'+(ok?' ok':'')+'">'+u+'</div></div>'}
function deltaU(p){if(p.start&&p.current){const d=Math.round((p.current-p.start)*10)/10;return (d<=0?'−':'+')+Math.abs(d).toString().replace('.',',')+' kg'}return 'kg'}
function quickCard(tab,icon,title,sub){const c=el('div','card');const p=el('div','card-pad');p.onclick=()=>go(tab);p.innerHTML='<i class="ti '+icon+'" style="font-size:18px"></i><div class="qt">'+title+'</div><div class="qs">'+esc(sub)+'</div>';c.appendChild(p);return c}
function suppsProgressText(){
  const s=SNAP;
  if(!s.supps||!s.supps.length)return '—';
  const log=getSuppLog(), todK=dKey(new Date());
  let done=0; s.supps.forEach(su=>{ if(log[todK]&&log[todK][su.name])done++; });
  return done+' από '+s.supps.length+' σήμερα';

function glanceCard(){
  const s=SNAP, p=s.progress||{};

  const streak=streakDays();

}

// ── PROGRESS (συνέπεια: διατροφή / συμπληρώματα / νερό + αυτόματες συμβουλές) ──
// Ποια ημέρα του πλάνου αντιστοιχεί σε μια ημερομηνία (JS day → plan index, Δευτέρα=0).
function planForDate(d){const map=[6,0,1,2,3,4,5];return (SNAP.days||[])[map[d.getDay()]]}
// Οι 7 ημερομηνίες (Δευτέρα→Κυριακή) μιας εβδομάδας. offset 0=τρέχουσα, -1=προηγούμενη …
function weekDatesOffset(offset){
  const now=new Date(); const js=now.getDay(); const toMon=(js===0?-6:1-js);
  const mon=new Date(now); mon.setDate(now.getDate()+toMon+offset*7); mon.setHours(0,0,0,0);
  const arr=[]; for(let i=0;i<7;i++){const d=new Date(mon);d.setDate(mon.getDate()+i);arr.push(d);} return arr;
}
// Συγκεντρωτικά ανά πυλώνα για ένα σύνολο ημερών. {upToToday} = αγνόησε μελλοντικές ημέρες.
function pillarStats(dates,opts){
  const s=SNAP, h=s.hydration||{}, per=h.glassMl||250;
  const mealsAll=(()=>{try{return JSON.parse(localStorage.getItem(lk('meals'))||'{}')}catch(e){return {}}})();
  const waterAll=(()=>{try{return JSON.parse(localStorage.getItem(lk('water'))||'{}')}catch(e){return {}}})();
  const suppAll=getSuppLog();
  const supCount=(s.supps||[]).length;
  const today=new Date(); today.setHours(23,59,59,999);
  const r={dietDone:0,dietTot:0,supDone:0,supTot:0,watDone:0,watTot:0,days:0,anyData:false};
  dates.forEach(d=>{
    if(opts&&opts.upToToday&&d>today)return;
    const pd=planForDate(d); if(!pd)return;
    r.days++;
    const k=dKey(d);
    const mealsN=(pd.meals||[]).length;
    let e=0; if(mealsN){r.dietTot++; const lg=mealsAll[k]||{}; for(let j=0;j<mealsN;j++)if(lg[j])e++; if(e>=mealsN)r.dietDone++;}
    let c=0; if(supCount){r.supTot++; const lg=suppAll[k]||{}; (s.supps||[]).forEach(su=>{if(lg[su.name])c++}); if(c>=supCount)r.supDone++;}
    const goalMl=(pd.isTrain&&h.trainMl)?h.trainMl:(h.baseMl||2000);
    const tg=Math.max(6,Math.round(goalMl/per)); const wn=waterAll[k]||0;
    r.watTot++; if(wn>=tg)r.watDone++;
    if(e>0||c>0||wn>0)r.anyData=true;
  });
  return r;
}
// Συνολικό σκορ = μέσος όρος των ποσοστών των πυλώνων που ισχύουν.
function overallScore(st){
  const ps=[]; if(st.dietTot)ps.push(st.dietDone/st.dietTot); if(st.supTot)ps.push(st.supDone/st.supTot); if(st.watTot)ps.push(st.watDone/st.watTot);
  if(!ps.length)return null; return Math.round(ps.reduce((a,b)=>a+b,0)/ps.length*100);
}
// Σερί: συνεχόμενες «τέλειες» ημέρες (όλοι οι πυλώνες ✓) μέχρι σήμερα.
function streakDays(){
  const s=SNAP, h=s.hydration||{}, per=h.glassMl||250;
  let mealsAll={},waterAll={}; try{mealsAll=JSON.parse(localStorage.getItem(lk('meals'))||'{}')}catch(e){} try{waterAll=JSON.parse(localStorage.getItem(lk('water'))||'{}')}catch(e){}
  const suppAll=getSuppLog(), supCount=(s.supps||[]).length;
  function good(d){
    const pd=planForDate(d); if(!pd)return false; const k=dKey(d);
    const mealsN=(pd.meals||[]).length;
    if(mealsN){const lg=mealsAll[k]||{}; let e=0; for(let j=0;j<mealsN;j++)if(lg[j])e++; if(e<mealsN)return false;}
    if(supCount){const lg=suppAll[k]||{}; let c=0;(s.supps||[]).forEach(su=>{if(lg[su.name])c++}); if(c<supCount)return false;}
    const goalMl=(pd.isTrain&&h.trainMl)?h.trainMl:(h.baseMl||2000); const tg=Math.max(6,Math.round(goalMl/per));
    if((waterAll[k]||0)<tg)return false; return true;
  }
  let n=0; const d=new Date(); d.setHours(0,0,0,0);
  if(!good(d))d.setDate(d.getDate()-1);
  while(good(d)){n++; d.setDate(d.getDate()-1); if(n>365)break;} return n;
}
// Αυτόματες συμβουλές βάσει αποτελεσμάτων (κανόνες, max 3).
function buildTips(cur,prev){
  const out=[], P=(d,t)=>t?Math.round(d/t*100):-1, dn=n=>n===1?'μέρα':'μέρες';
  const pillars=[
    {pct:P(cur.dietDone,cur.dietTot),miss:cur.dietTot-cur.dietDone,
      low:'Η διατροφή δυσκόλεψε αυτή την εβδομάδα. Ετοίμασε τα γεύματα από το προηγούμενο βράδυ.',
      mid:'Έχασες {n} {dn} στη διατροφή. Λίγη προετοιμασία κάνει τη διαφορά.',
      ok:'Σταθερή διατροφή όλη την εβδομάδα — μπράβο!'},
    {pct:P(cur.supDone,cur.supTot),miss:cur.supTot-cur.supDone,
      low:'Τα συμπληρώματα ξεχάστηκαν αρκετά. Βάλε υπενθύμιση ή άφησέ τα δίπλα στο πρωινό.',
      mid:'Ξέχασες τα συμπληρώματα {n} {dn}. Δοκίμασε να τα αφήσεις δίπλα στο πρωινό.',
      ok:'Συνέπεια στα συμπληρώματα — τέλεια!'},
    {pct:P(cur.watDone,cur.watTot),miss:cur.watTot-cur.watDone,
      low:'Η ενυδάτωση χρειάζεται προσοχή. Κράτα ένα μπουκάλι μαζί σου όλη μέρα.',
      mid:'Λίγο πιο κάτω στο νερό ({n} {dn}). Ένα ποτήρι πριν από κάθε γεύμα κλείνει το κενό.',
      ok:'Τέλεια ενυδάτωση — κράτα το!'}
  ];
  if(prev&&prev.anyData){
    const c=overallScore(cur), p=overallScore(prev);
    if(c!=null&&p!=null){const diff=c-p;
      if(diff>=5)out.push({t:'up',x:'Ανέβηκες +'+diff+'% από την προηγούμενη εβδομάδα. Μπράβο!'});
      else if(diff<=-5)out.push({t:'info',x:'Λίγο πιο κάτω από την προηγούμενη εβδομάδα. Καμία πίεση — νέα αρχή!'});
    }
  }
  pillars.filter(p=>p.pct>=0&&p.pct<85).sort((a,b)=>a.pct-b.pct).forEach(p=>{
    if(out.length>=3)return;
    out.push({t:'warn',x:p.pct<50?p.low:p.mid.replace('{n}',p.miss).replace('{dn}',dn(p.miss))});
  });
  pillars.filter(p=>p.pct>=90).sort((a,b)=>b.pct-a.pct).forEach(p=>{ if(out.length<3)out.push({t:'ok',x:p.ok}); });
  if(!out.length)out.push({t:'ok',x:'Καλή δουλειά αυτή την εβδομάδα! Συνέχισε έτσι.'});
  return out.slice(0,3);
}
function scoreGreeting(sc){
  if(sc==null)return 'Ξεκίνα να καταγράφεις!';
  if(sc>=85)return 'Εξαιρετική εβδομάδα!'; if(sc>=70)return 'Καλή εβδομάδα!';
  if(sc>=50)return 'Καλή προσπάθεια!'; return 'Νέα εβδομάδα, νέα αρχή!';
}

// Headline value + Δ από την αρχή, πάνω από κάθε γράφημα σωματικής σύνθεσης.
// goodDir: -1 = η μείωση είναι θετική (λίπος), +1 = η αύξηση είναι θετική (άλιπη μάζα).
function chartHeader(title,curVal,unit,startVal,goodDir){
  const big='<span style="font-size:18px;font-weight:600;color:var(--teal-d)">'+(curVal!=null?String(curVal).replace('.',','):'—')+unit+'</span>';
  let deltaTxt='';
  if(startVal!=null&&curVal!=null){
    const d=Math.round((curVal-startVal)*10)/10;
    if(d!==0){
      const down=d<0;
      const good=(goodDir<0&&down)||(goodDir>0&&!down);
      deltaTxt='<span style="font-size:11px;color:'+(good?'var(--ok)':'var(--muted)')+';margin-left:6px">'+(down?'▼':'▲')+' '+Math.abs(d).toString().replace('.',',')+unit+' από την αρχή</span>';
    }
  }
  return el('div',null,'<div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px"><span style="font-size:12px;color:var(--muted)">'+title+'</span><span>'+big+deltaTxt+'</span></div>');
}
// Ζώνες αναφοράς %BF (ACSM) — ίδιες τιμές με το έντυπο λιπομέτρησης της διαιτολόγου.
function bfBands(sex){
  return sex==='F'
    ?[{lo:10,hi:13,col:'#1565C0'},{lo:14,hi:20,col:'#2e7d32'},{lo:21,hi:24,col:'#558b2f'},{lo:25,hi:31,col:'#f57c00'},{lo:32,hi:60,col:'#c62828'}]
    :[{lo:2,hi:5,col:'#1565C0'},{lo:6,hi:13,col:'#2e7d32'},{lo:14,hi:17,col:'#558b2f'},{lo:18,hi:24,col:'#f57c00'},{lo:25,hi:60,col:'#c62828'}];
}
function bfBandsLegend(sex){
  const labels=['Απαραίτητο','Αθλητικό','Φυσιολογικό','Αποδεκτό','Παχυσαρκία'];
  const bands=bfBands(sex);
  let items='';
  bands.forEach((b,i)=>{items+='<span style="display:inline-flex;align-items:center;gap:4px;margin-right:10px"><span style="width:8px;height:8px;border-radius:2px;background:'+b.col+';display:inline-block"></span>'+labels[i]+'</span>';});
  return el('div',null,'<div style="font-size:10px;color:var(--muted);margin-top:8px;line-height:1.8">'+items+'<div style="margin-top:2px">Τιμές αναφοράς ACSM</div></div>');
}
function fmtDateShort(iso){
  if(!iso)return '';
  const d=new Date(iso); if(isNaN(d))return '';
  return d.getDate()+'/'+(d.getMonth()+1);
}
function sparklineKey(log,key,goal,color,opts){
  opts=opts||{};
  const W=300,H=120,padL=8,padB=18,padT=8;
  const ys=log.map(x=>x[key]);let mn=Math.min(...ys),mx=Math.max(...ys);
  if(goal!=null){mn=Math.min(mn,goal);mx=Math.max(mx,goal)}
  if(mx-mn<1){mx+=0.5;mn-=0.5}
  const vpad=(mx-mn)*0.15; mn-=vpad; mx+=vpad;
  const sx=i=>padL+ (i/(log.length-1))*(W-padL-8);
  const sy=v=>padT+(1-(v-mn)/(mx-mn))*(H-padT-padB);
  let svg='<svg viewBox="0 0 '+W+' '+H+'" width="100%" role="img" aria-label="Γράφημα">';
  if(opts.bands){
    opts.bands.forEach(b=>{
      const lo=Math.max(b.lo,mn), hi=Math.min(b.hi,mx);
      if(hi<=lo)return;
      const y1=sy(hi), y2=sy(lo);
      svg+='<rect x="'+padL+'" y="'+y1+'" width="'+(W-padL-8)+'" height="'+(y2-y1)+'" fill="'+b.col+'" opacity="0.12"/>';
    });
  }
  if(goal!=null){const gy=sy(goal);svg+='<line x1="'+padL+'" y1="'+gy+'" x2="'+(W-8)+'" y2="'+gy+'" stroke="#9fcabf" stroke-width="1" stroke-dasharray="3 3"/><text x="'+(W-46)+'" y="'+(gy-3)+'" font-size="8" fill="var(--teal-l)">στόχος</text>'}
  let pts=log.map((x,i)=>sx(i)+','+sy(x[key])).join(' ');
  svg+='<polyline points="'+pts+'" fill="none" stroke="'+color+'" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>';
  svg+='<circle cx="'+sx(0)+'" cy="'+sy(log[0][key])+'" r="3" fill="'+color+'"/>';
  svg+='<circle cx="'+sx(log.length-1)+'" cy="'+sy(log[log.length-1][key])+'" r="4" fill="'+color+'"/>';
  svg+='<text x="'+padL+'" y="'+(H-4)+'" font-size="9" fill="var(--faint)">'+fmtDateShort(log[0].date)+'</text>';
  svg+='<text x="'+(W-8)+'" y="'+(H-4)+'" font-size="9" fill="var(--faint)" text-anchor="end">'+fmtDateShort(log[log.length-1].date)+'</text>';
  svg+='</svg>';
  const d=el('div');d.innerHTML=svg;return d;
}

  }
  c.appendChild(g);
  if(!mini)c.appendChild(el('div','empty-glass-note','Πάτα ένα ποτήρι για να καταγράψεις πόσο νερό ήπιες σήμερα.'));
  return c;
}
function curTab(){const b=document.querySelector('.nav button.on');return b?b.dataset.tab:'home'}
// clean water-glass (tumbler) icon — empty = outline, full = with water
function glassSVG(on){
  const stroke=on?'#025857':'#a9c2bc';
  const water=on?'<path d="M7.25 11 L16.75 11 L15.7 19.3 Q15.55 20.6 14.2 20.6 L9.8 20.6 Q8.45 20.6 8.3 19.3 Z" fill="#7ec6bf"/>':'';
  return '<svg viewBox="0 0 24 24" width="30" height="30" aria-hidden="true">'
    +water
    +'<path d="M5.4 3.6 L18.6 3.6 L16.9 19.4 Q16.7 21 14.9 21 L9.1 21 Q7.3 21 7.1 19.4 Z" fill="none" stroke="'+stroke+'" stroke-width="1.5" stroke-linejoin="round"/>'
    +(on?'<line x1="7.4" y1="11" x2="16.6" y2="11" stroke="#025857" stroke-width="1.1" opacity="0.5"/>':'')
    +'</svg>';
}

function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}

boot();
