<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <title>Cloud Login - Simple Test</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #025857 0%, #037070 100%);
      margin: 0;
      font-family: Arial, sans-serif;
    }
    .container {
      background: white;
      padding: 50px;
      border-radius: 10px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.3);
      text-align: center;
      width: 90%;
      max-width: 400px;
    }
    h1 { color: #025857; margin: 0 0 10px 0; }
    p { color: #666; }
    input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border: 1px solid #ddd;
      border-radius: 5px;
      font-size: 14px;
      box-sizing: border-box;
    }
    button {
      width: 100%;
      padding: 12px;
      background: #025857;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
      margin-top: 10px;
    }
    button:hover { background: #037070; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🍽️ Dietologist Cloud</h1>
    <p>Simple Login Test</p>
    <input type="text" placeholder="Username" id="user">
    <input type="password" placeholder="Password" id="pass">
    <button onclick="testLogin()">Login Test</button>
    <p id="msg" style="color: #c62828;"></p>
  </div>

  <script>
    function testLogin() {
      const user = document.getElementById('user').value;
      const pass = document.getElementById('pass').value;

      if (!user || !pass) {
        document.getElementById('msg').textContent = 'Fill in both fields';
        return;
      }

      // Simple test
      alert('✅ This is a working login form!');
    }
  </script>
</body>
</html>
