<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dietologist - Cloud Edition</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f5f5f5; }

    /* LOGIN PAGE */
    .auth-page { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
    .auth-container { background: white; padding: 40px; border-radius: 10px; box-shadow: 0 10px 40px rgba(0,0,0,0.3); width: 100%; max-width: 400px; }
    .auth-title { text-align: center; margin-bottom: 30px; font-size: 28px; color: #333; }
    .auth-input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; font-size: 14px; }
    .auth-button { width: 100%; padding: 12px; margin-top: 20px; background: #667eea; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; font-weight: bold; }
    .auth-button:hover { background: #5568d3; }
    .auth-toggle { text-align: center; margin-top: 15px; font-size: 14px; color: #666; }
    .auth-toggle a { color: #667eea; cursor: pointer; text-decoration: none; }
    .auth-error { color: red; margin-top: 10px; font-size: 13px; text-align: center; }
    .auth-loading { text-align: center; color: #667eea; }

    /* MAIN APP */
    .app-page { display: none; }

    /* HEADER */
    .header { background: #025857; color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; }
    .header-title { font-size: 20px; font-weight: bold; }
    .header-user { font-size: 13px; }
    .logout-btn { background: #ff6b35; padding: 8px 15px; border: none; color: white; border-radius: 5px; cursor: pointer; }

    /* SIDEBAR */
    .sidebar { background: #f9f9f9; padding: 15px; border-right: 1px solid #ddd; }
    .client-item { padding: 10px; margin: 5px 0; background: white; border-radius: 5px; cursor: pointer; }
    .client-item.active { background: #e3f2fd; }

    /* MAIN CONTENT */
    .main-content { padding: 20px; }

    /* SYNC STATUS */
    .sync-status { background: #e3f2fd; padding: 10px; border-radius: 5px; margin: 10px 0; font-size: 12px; }
  </style>
</head>
<body>

<!-- LOGIN/REGISTER PAGE -->
<div id="authPage" class="auth-page">
  <div class="auth-container">
    <div class="auth-title" id="authTitle">Σύνδεση</div>

    <input type="text" id="authUsername" class="auth-input" placeholder="Όνομα χρήστη" />
    <input type="password" id="authPassword" class="auth-input" placeholder="Κωδικός" />
    <input type="email" id="authEmail" class="auth-input" placeholder="Email" style="display:none;" />

    <button class="auth-button" id="authButton" onclick="handleAuth()">Σύνδεση</button>

    <div class="auth-error" id="authError"></div>
    <div class="auth-loading" id="authLoading" style="display:none;">⏳ Περίμενε...</div>

    <div class="auth-toggle">
      Δεν έχεις λογαριασμό; <a onclick="toggleAuthMode()">Δημιουργήστε ένα</a>
    </div>

    <div style="margin-top: 20px; border-top: 1px solid #ddd; padding-top: 15px;">
      <button onclick="importExistingData()" style="width: 100%; padding: 10px; background: #1565C0; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold;">
        📥 Εισαγωγή Παλιών Δεδομένων
      </button>
      <p style="font-size: 11px; color: #666; margin-top: 8px; text-align: center;">
        Έχεις παλιά JSON file; Εισάγε το εδώ πριν δημιουργήσεις account
      </p>
    </div>
  </div>
</div>

<!-- MAIN APP PAGE -->
<div id="appPage" class="app-page">
  <div class="header">
    <div class="header-title">Dietologist - Cloud</div>
    <div style="display: flex; gap: 10px; align-items: center;">
      <div class="header-user" id="userDisplay"></div>
      <button onclick="openSettings()" style="background: #1565C0; padding: 8px 12px; border: none; color: white; border-radius: 5px; cursor: pointer; font-weight: bold;">⚙️ Ρυθμίσεις</button>
      <button class="logout-btn" onclick="logout()">Αποσύνδεση</button>
    </div>
  </div>

  <div class="sync-status" id="syncStatus"></div>

  <div id="mainContainer">
    <!-- Το Dietologist app θα φορτωθεί εδώ -->
  </div>
</div>

<!-- SETTINGS MODAL -->
<div id="settingsModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 10000; flex-direction: column; justify-content: center; align-items: center;">
  <div style="background: white; padding: 30px; border-radius: 10px; width: 90%; max-width: 500px; max-height: 80vh; overflow-y: auto; box-shadow: 0 4px 20px rgba(0,0,0,0.3);">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 2px solid #e0e0e0; padding-bottom: 10px;">
      <h2 style="color: #025857; margin: 0;">⚙️ Ρυθμίσεις Λογαριασμού</h2>
      <button onclick="closeSettings()" style="background: #ff6b35; color: white; border: none; padding: 8px 12px; border-radius: 5px; cursor: pointer; font-weight: bold;">✕</button>
    </div>

    <!-- Profile Info -->
    <div style="background: #f5f5f5; padding: 15px; border-radius: 8px; margin-bottom: 20px;">
      <p style="margin: 0 0 10px 0; color: #666; font-size: 12px; font-weight: bold; text-transform: uppercase;">👤 Προφίλ</p>
      <p style="margin: 5px 0; color: #333;"><strong>Όνομα χρήστη:</strong> <span id="settingsUsername"></span></p>
      <p style="margin: 5px 0; color: #333;"><strong>Email:</strong> <span id="settingsEmail"></span></p>
      <p style="margin: 5px 0; color: #999; font-size: 12px;"><strong>User ID:</strong> <span id="settingsUserId"></span></p>
    </div>

    <!-- Change Password -->
    <div style="margin-bottom: 20px;">
      <label style="display: block; color: #666; font-size: 12px; font-weight: bold; margin-bottom: 8px; text-transform: uppercase;">🔒 Αλλαγή Κωδικού</label>
      <input type="password" id="newPassword" placeholder="Νέος κωδικός" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; margin-bottom: 8px; font-size: 14px;">
      <input type="password" id="confirmPassword" placeholder="Επιβεβαίωση κωδικού" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; margin-bottom: 8px; font-size: 14px;">
      <button onclick="changePassword()" style="width: 100%; padding: 10px; background: #025857; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold;">Αποθήκευση Κωδικού</button>
    </div>

    <!-- Change Email -->
    <div style="margin-bottom: 20px;">
      <label style="display: block; color: #666; font-size: 12px; font-weight: bold; margin-bottom: 8px; text-transform: uppercase;">📧 Αλλαγή Email</label>
      <input type="email" id="newEmail" placeholder="Νέο email" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; margin-bottom: 8px; font-size: 14px;">
      <button onclick="changeEmail()" style="width: 100%; padding: 10px; background: #1565C0; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold;">Αποθήκευση Email</button>
    </div>

    <!-- Export/Import Data -->
    <div style="background: #E2EEE5; padding: 15px; border-radius: 8px; margin-bottom: 20px;">
      <p style="margin: 0 0 10px 0; color: #025857; font-size: 12px; font-weight: bold; text-transform: uppercase;">💾 Δεδομένα</p>
      <button onclick="exportUserData()" style="width: 100%; padding: 10px; background: #025857; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; margin-bottom: 8px;">💾 Εξαγωγή Δεδομένων</button>
      <button onclick="importUserData()" style="width: 100%; padding: 10px; background: #1565C0; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold;">📥 Εισαγωγή Δεδομένων</button>
    </div>

    <!-- Danger Zone -->
    <div style="background: #ffebee; padding: 15px; border-radius: 8px; border: 1px solid #ffcdd2;">
      <p style="margin: 0 0 10px 0; color: #c62828; font-size: 12px; font-weight: bold; text-transform: uppercase;">⚠️ Επικίνδυνη Ζώνη</p>
      <button onclick="deleteAccount()" style="width: 100%; padding: 10px; background: #c62828; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold;">🗑️ Διαγραφή Λογαριασμού</button>
      <p style="margin: 8px 0 0 0; color: #c62828; font-size: 11px;">⚠️ Αυτή η ενέργεια δεν μπορεί να αναιρεθεί!</p>
    </div>
  </div>
</div>

<script>
  // ========== CONFIG ==========
  const API_URL = "https://script.google.com/macros/s/AKfycbyCg6AN5dkpiBXR_SaJRZsOinaK6Qxqg3zUQksZEj0_vBLaH2W9FK6L3s0uzTJS27iL/exec";

  // ========== STATE ==========
  let authMode = "login"; // login or register
  let currentUser = null;
  let cloudClients = [];

  // ========== STORAGE KEY HELPER ==========
  function getStorageKey(baseKey) {
    if (currentUser) {
      return 'cloud_' + currentUser.username + '_' + baseKey;
    }
    return baseKey;
  }

  // ========== AUTH ==========
  function toggleAuthMode() {
    authMode = authMode === "login" ? "register" : "login";
    document.getElementById("authTitle").textContent = authMode === "login" ? "Σύνδεση" : "Δημιουργία Λογαριασμού";
    document.getElementById("authButton").textContent = authMode === "login" ? "Σύνδεση" : "Δημιουργήστε";
    document.getElementById("authEmail").style.display = authMode === "register" ? "block" : "none";
    document.getElementById("authError").textContent = "";
  }

  async function handleAuth() {
    const username = document.getElementById("authUsername").value.trim();
    const password = document.getElementById("authPassword").value.trim();
    const email = document.getElementById("authEmail").value.trim();

    if (!username || !password) {
      showAuthError("Συμπληρώστε όλα τα πεδία");
      return;
    }

    if (authMode === "register" && !email) {
      showAuthError("Συμπληρώστε το email");
      return;
    }

    showAuthLoading(true);

    try {
      const action = authMode === "login" ? "login" : "register";
      const params = new URLSearchParams();
      params.append("action", action);
      params.append("username", username);
      params.append("password", password);
      if (authMode === "register") params.append("email", email);

      // Set 5 second timeout
      const controller = new AbortController();
      const timeoutId = setTimeout(() => controller.abort(), 5000);

      const response = await fetch(API_URL, {
        method: "POST",
        body: params.toString(),
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        signal: controller.signal
      });

      clearTimeout(timeoutId);
      const text = await response.text();

      try {
        const result = JSON.parse(text);
        if (result.success) {
          currentUser = { id: result.user_id, username: result.username, email: result.email };
          localStorage.setItem("currentUser", JSON.stringify(currentUser));
          showAuthPage(false);
          loadClients();
        } else {
          showAuthError(result.error || "Σφάλμα κατά τη σύνδεση");
        }
      } catch (parseErr) {
        // If JSON parse fails, use localStorage as fallback
        console.warn("API returned non-JSON, using fallback");
        useFallbackAuth(username, password, email);
      }
    } catch (err) {
      if (err.name === "AbortError") {
        showAuthError("Timeout: Το API είναι αργό. Δοκιμάζω fallback mode...");
        setTimeout(() => useFallbackAuth(username, password, email), 1000);
      } else {
        showAuthError("Σφάλμα: " + err.message);
      }
    }

    showAuthLoading(false);
  }

  function useFallbackAuth(username, password, email) {
    // Fallback: Use localStorage instead of cloud
    console.log("Using fallback authentication");
    var users = JSON.parse(localStorage.getItem("fallback_users") || "{}");

    if (authMode === "login") {
      if (users[username] && users[username].password === password) {
        currentUser = { id: users[username].id, username: username, email: users[username].email };
        localStorage.setItem("currentUser", JSON.stringify(currentUser));
        showAuthPage(false);
        loadClients();
      } else {
        showAuthError("Χρήστης ή κωδικός λάθος");
      }
    } else {
      if (users[username]) {
        showAuthError("Ο χρήστης υπάρχει ήδη");
      } else {
        users[username] = { id: "u" + Date.now(), username: username, password: password, email: email };
        localStorage.setItem("fallback_users", JSON.stringify(users));
        currentUser = users[username];
        localStorage.setItem("currentUser", JSON.stringify(currentUser));
        showAuthPage(false);
        loadClients();
      }
    }
  }

  function logout() {
    currentUser = null;
    localStorage.removeItem("currentUser");
    showAuthPage(true);
    document.getElementById("authUsername").value = "";
    document.getElementById("authPassword").value = "";
    document.getElementById("authEmail").value = "";
  }

  // ========== IMPORT EXISTING DATA BEFORE ACCOUNT CREATION ==========
  function importExistingData() {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = '.json';
    input.onchange = (e) => {
      const file = e.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = (event) => {
        try {
          const importedData = JSON.parse(event.target.result);
          const username = importedData.username || prompt('Ποιο είναι το όνομα χρήστη;');

          if (!username) {
            alert('Ακύρωση εισαγωγής');
            return;
          }

          // Create temp user for import
          currentUser = { id: 'u' + Date.now(), username: username, email: importedData.email || '' };

          // Import data
          if (importedData.clients && Array.isArray(importedData.clients)) {
            localStorage.setItem(getStorageKey('fyh_clients'), JSON.stringify(importedData.clients));
          }

          if (importedData.templates && Array.isArray(importedData.templates)) {
            localStorage.setItem(getStorageKey('fyh_custom_tmpls'), JSON.stringify(importedData.templates));
          }

          // Save user
          localStorage.setItem("currentUser", JSON.stringify(currentUser));

          alert(`✅ Δεδομένα εισήχθησαν! Καλώς ήρθες ${username}!`);
          showAuthPage(false);
          loadClients();
        } catch (err) {
          alert('❌ Σφάλμα: ' + err.message);
        }
      };
      reader.readAsText(file);
    };
    input.click();
  }

  // ========== UI HELPERS ==========
  function showAuthPage(show) {
    document.getElementById("authPage").style.display = show ? "flex" : "none";
    document.getElementById("appPage").style.display = show ? "none" : "block";
  }

  function showAuthError(msg) {
    document.getElementById("authError").textContent = msg;
  }

  function showAuthLoading(show) {
    document.getElementById("authLoading").style.display = show ? "block" : "none";
  }

  function updateSyncStatus(msg) {
    document.getElementById("syncStatus").textContent = msg || "✅ Συγχρονισμένο";
  }

  // ========== LOAD DATA ==========
  async function loadClients() {
    if (!currentUser) return;

    updateSyncStatus("📥 Φόρτωση δεδομένων...");

    try {
      // Try cloud API with timeout
      const params = new URLSearchParams();
      params.append("action", "getClients");
      params.append("user_id", currentUser.id);

      const controller = new AbortController();
      const timeoutId = setTimeout(() => controller.abort(), 5000);

      try {
        const response = await fetch(API_URL, {
          method: "POST",
          body: params.toString(),
          headers: { "Content-Type": "application/x-www-form-urlencoded" },
          signal: controller.signal
        });
        clearTimeout(timeoutId);

        const text = await response.text();
        const result = JSON.parse(text);

        if (result.success) {
          cloudClients = result.clients || [];
          document.getElementById("userDisplay").textContent = "👤 " + currentUser.username;
          updateSyncStatus("✅ Συγχρονισμένο με cloud");
          loadDietologistApp();
          return;
        }
      } catch (fetchErr) {
        clearTimeout(timeoutId);
      }

      // Fallback: Use local storage
      console.log("Cloud API unavailable, using local storage");
      document.getElementById("userDisplay").textContent = "👤 " + currentUser.username + " (offline)";
      updateSyncStatus("⚠️ Offline mode - χρήση τοπικής αποθήκευσης");
      loadDietologistApp();
    } catch (err) {
      document.getElementById("userDisplay").textContent = "👤 " + currentUser.username;
      updateSyncStatus("⚠️ Offline mode");
      loadDietologistApp();
    }
  }

  // ========== LOAD DATA FROM DESKTOP VERSION ==========
  function importDesktopData() {
    // Try to load existing data from desktop version
    const desktopClients = localStorage.getItem('fyh_clients');
    const desktopTemplates = localStorage.getItem('fyh_custom_tmpls');

    if (desktopClients) {
      const cloudClientsKey = getStorageKey('fyh_clients');
      localStorage.setItem(cloudClientsKey, desktopClients);
      console.log('✅ Desktop clients imported to cloud');
    }

    if (desktopTemplates) {
      const cloudTemplatesKey = getStorageKey('fyh_custom_tmpls');
      localStorage.setItem(cloudTemplatesKey, desktopTemplates);
      console.log('✅ Desktop templates imported to cloud');
    }
  }

  function getStorageKey(baseKey) {
    if (currentUser) {
      return 'cloud_' + currentUser.username + '_' + baseKey;
    }
    return baseKey;
  }

  // ========== LOAD DIETOLOGIST APP ==========
  function loadDietologistApp() {
    // Import data from desktop version on first load
    importDesktopData();

    // Load the full Dietologist app inside an iframe
    const mainContainer = document.getElementById("mainContainer");
    mainContainer.innerHTML = `
      <div style="background: white; border-radius: 8px; padding: 15px; margin-bottom: 10px;">
        <button onclick="exportUserData()" style="background: #025857; color: white; padding: 8px 12px; border: none; border-radius: 5px; cursor: pointer; margin-right: 8px;">💾 Αποθήκευση Δεδομένων</button>
        <button onclick="importUserData()" style="background: #1565C0; color: white; padding: 8px 12px; border: none; border-radius: 5px; cursor: pointer;">📥 Εισαγωγή Δεδομένων</button>
      </div>
      <iframe
        id="dietologistFrame"
        src="Dietologist.html"
        style="width: 100%; height: calc(100vh - 220px); border: 1px solid #ddd; border-radius: 5px;"
        allow="clipboard-read; clipboard-write"
      ></iframe>
    `;

    // Send user info to iframe after a short delay (let it load first)
    setTimeout(() => {
      const frame = document.getElementById("dietologistFrame");
      if (frame && frame.contentWindow) {
        frame.contentWindow.postMessage({
          type: "CLOUD_USER",
          username: currentUser.username,
          userId: currentUser.id
        }, "*");
      }
    }, 1000);
  }

  // ========== EXPORT/IMPORT USER DATA ==========
  function exportUserData() {
    if (!currentUser) {
      alert('Κάνε login πρώτα');
      return;
    }

    const clients = localStorage.getItem(getStorageKey('fyh_clients'));
    const templates = localStorage.getItem(getStorageKey('fyh_custom_tmpls'));

    const exportData = {
      username: currentUser.username,
      exportedAt: new Date().toISOString(),
      clients: clients ? JSON.parse(clients) : [],
      templates: templates ? JSON.parse(templates) : []
    };

    const blob = new Blob([JSON.stringify(exportData, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `dietologist_${currentUser.username}_${new Date().toISOString().split('T')[0]}.json`;
    a.click();
    URL.revokeObjectURL(url);

    alert('✅ Δεδομένα εξαγόμενα επιτυχώς!');
  }

  function importUserData() {
    if (!currentUser) {
      alert('Κάνε login πρώτα');
      return;
    }

    const input = document.createElement('input');
    input.type = 'file';
    input.accept = '.json';
    input.onchange = (e) => {
      const file = e.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = (event) => {
        try {
          const importedData = JSON.parse(event.target.result);

          if (importedData.clients && Array.isArray(importedData.clients)) {
            localStorage.setItem(getStorageKey('fyh_clients'), JSON.stringify(importedData.clients));
            console.log('✅ Clients imported');
          }

          if (importedData.templates && Array.isArray(importedData.templates)) {
            localStorage.setItem(getStorageKey('fyh_custom_tmpls'), JSON.stringify(importedData.templates));
            console.log('✅ Templates imported');
          }

          alert('✅ Δεδομένα εισήχθησαν επιτυχώς! Ανανέωσε τη σελίδα.');
        } catch (err) {
          alert('❌ Σφάλμα στην εισαγωγή: ' + err.message);
        }
      };
      reader.readAsText(file);
    };
    input.click();
  }

  // ========== SETTINGS ==========
  function openSettings() {
    if (!currentUser) return;

    document.getElementById('settingsUsername').textContent = currentUser.username;
    document.getElementById('settingsEmail').textContent = currentUser.email || '(δεν έχει οριστεί)';
    document.getElementById('settingsUserId').textContent = currentUser.id;
    document.getElementById('settingsModal').style.display = 'flex';
  }

  function closeSettings() {
    document.getElementById('settingsModal').style.display = 'none';
    document.getElementById('newPassword').value = '';
    document.getElementById('confirmPassword').value = '';
    document.getElementById('newEmail').value = '';
  }

  function changePassword() {
    if (!currentUser) {
      alert('Κάνε login πρώτα');
      return;
    }

    const newPass = document.getElementById('newPassword').value.trim();
    const confirmPass = document.getElementById('confirmPassword').value.trim();

    if (!newPass) {
      alert('Συμπλήρωσε το νέο κωδικό');
      return;
    }

    if (newPass !== confirmPass) {
      alert('Οι κωδικοί δεν ταιριάζουν');
      return;
    }

    if (newPass.length < 6) {
      alert('Ο κωδικός πρέπει να έχει τουλάχιστον 6 χαρακτήρες');
      return;
    }

    try {
      // Update in fallback_users
      var users = JSON.parse(localStorage.getItem('fallback_users') || '{}');

      if (!users[currentUser.username]) {
        alert('❌ Σφάλμα: Χρήστης δεν βρέθηκε. Ίσως χρησιμοποιείς import mode.');
        return;
      }

      users[currentUser.username].password = newPass;
      localStorage.setItem('fallback_users', JSON.stringify(users));

      alert('✅ Κωδικός αλλάχθηκε επιτυχώς!');
      console.log('Password changed for user:', currentUser.username);

      document.getElementById('newPassword').value = '';
      document.getElementById('confirmPassword').value = '';
    } catch (err) {
      alert('❌ Σφάλμα: ' + err.message);
      console.error('Password change error:', err);
    }
  }

  function changeEmail() {
    if (!currentUser) {
      alert('Κάνε login πρώτα');
      return;
    }

    const newEmail = document.getElementById('newEmail').value.trim();

    if (!newEmail) {
      alert('Συμπλήρωσε το νέο email');
      return;
    }

    if (!newEmail.includes('@')) {
      alert('Εισάγε ένα έγκυρο email');
      return;
    }

    try {
      // Update current user
      currentUser.email = newEmail;
      localStorage.setItem('currentUser', JSON.stringify(currentUser));

      // Update in fallback_users
      var users = JSON.parse(localStorage.getItem('fallback_users') || '{}');
      if (users[currentUser.username]) {
        users[currentUser.username].email = newEmail;
        localStorage.setItem('fallback_users', JSON.stringify(users));
      }

      alert('✅ Email αλλάχθηκε επιτυχώς!');
      console.log('Email changed for user:', currentUser.username);

      document.getElementById('newEmail').value = '';
      document.getElementById('settingsEmail').textContent = newEmail;
    } catch (err) {
      alert('❌ Σφάλμα: ' + err.message);
      console.error('Email change error:', err);
    }
  }

  function deleteAccount() {
    const confirm1 = prompt('⚠️ Αυτό διαγράφει ΌΛΑ τα δεδομένα σου. Γράψε το username σου για επιβεβαίωση:');

    if (!confirm1 || confirm1 !== currentUser.username) {
      alert('Ακύρωση');
      return;
    }

    const confirm2 = confirm('Είσαι σίγουρος; Αυτή η ενέργεια δεν μπορεί να αναιρεθεί!');
    if (!confirm2) return;

    // Delete user data
    var users = JSON.parse(localStorage.getItem('fallback_users') || '{}');
    delete users[currentUser.username];
    localStorage.setItem('fallback_users', JSON.stringify(users));

    // Delete user cloud data
    localStorage.removeItem(getStorageKey('fyh_clients'));
    localStorage.removeItem(getStorageKey('fyh_custom_tmpls'));

    alert('✅ Λογαριασμός διαγράφηκε');
    logout();
  }

  // ========== INIT ==========
  function init() {
    const saved = localStorage.getItem("currentUser");
    if (saved) {
      try {
        currentUser = JSON.parse(saved);
        showAuthPage(false);
        loadClients();
      } catch (err) {
        showAuthPage(true);
      }
    } else {
      showAuthPage(true);
    }
  }

  // Start
  init();
</script>
