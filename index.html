<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Εργαλείο Διαιτολόγου</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;font-size:13px;background:#f5f5f5;color:#1a1a1a}
.app{display:flex;min-height:100vh}
/* Sidebar clients */
.sb{width:190px;flex-shrink:0;border-right:1px solid #e0e0e0;padding:12px 8px;background:#fff;position:sticky;top:0;height:100vh;overflow-y:auto}
.sb-title{font-size:10px;font-weight:700;color:#999;padding:0 8px 8px;text-transform:uppercase;letter-spacing:.5px}
.ci{padding:6px 10px;border-radius:7px;cursor:pointer;font-size:12px;margin-bottom:2px;display:flex;align-items:center;justify-content:space-between}
.ci:hover{background:#f5f5f5}
.ci.active{background:#E2EEE5;color:#025857;font-weight:600}
.ci .cdel{opacity:0;font-size:10px;cursor:pointer;color:#c62828;border:none;background:none;padding:1px 3px}
.ci:hover .cdel{opacity:1}
.add-btn{width:100%;padding:6px 10px;border-radius:7px;border:1px dashed #ccc;background:transparent;cursor:pointer;font-size:12px;color:#888;text-align:left;margin-top:8px}
.add-btn:hover{background:#f5f5f5;border-color:#025857;color:#025857}
.client-search-inp{width:100%;padding:5px 9px;border:1px solid #e0e0e0;border-radius:7px;font-size:11px;background:#f9f9f9;margin-bottom:6px;font-family:inherit}
.client-search-inp:focus{outline:none;border-color:#025857;background:#fff}
/* Main */
.main{flex:1;padding:14px 16px;overflow:auto;min-width:0}
.stabs{display:flex;border-bottom:1px solid #e0e0e0;margin-bottom:14px}
.stab{padding:7px 16px;font-size:12px;cursor:pointer;color:#888;border-bottom:2px solid transparent;margin-bottom:-1px;background:none;border-top:none;border-left:none;border-right:none}
.stab.active{color:#025857;border-bottom-color:#025857;font-weight:600}
/* Client form */
.fg{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.fg3{grid-template-columns:1fr 1fr 1fr}
.fg4{grid-template-columns:1fr 1fr 1fr 1fr}
.fgrp label{display:block;font-size:11px;color:#666;margin-bottom:4px;font-weight:500}
.fgrp input,.fgrp select{width:100%;padding:7px 10px;border-radius:7px;border:1px solid #ddd;background:#fff;color:#1a1a1a;font-size:12px}
.fgrp input:focus,.fgrp select:focus{outline:none;border-color:#025857;box-shadow:0 0 0 2px rgba(2,88,87,.1)}
.tdee-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px;background:#E2EEE5;border-radius:10px;padding:12px;border:1px solid #c5ddd8}
.ti .tl{font-size:10px;color:#555;font-weight:500}
.ti .tv{font-size:15px;font-weight:700;margin-top:3px;color:#025857}
.tv.b{color:#1565C0}
.brow{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.btn{padding:7px 14px;border-radius:7px;border:1px solid #ddd;cursor:pointer;font-size:12px;font-weight:600;background:#fff;color:#333}
.btn:hover{background:#f5f5f5}
.btn.primary{background:#025857;color:#fff;border-color:#025857}
.btn.primary:hover{background:#037070}
.btn.info{background:#1565C0;color:#fff;border-color:#1565C0}
.btn.info:hover{background:#1976D2}
/* Plan layout */
.plan-wrap{display:flex;gap:12px;align-items:flex-start}
.week-main{flex:1;overflow-x:auto;min-width:0}
/* Weekly table */
.week-table{border-collapse:collapse;min-width:860px;width:100%}
.week-table thead th{padding:7px 6px;background:#025857;color:#fff;font-size:11px;font-weight:600;text-align:center;white-space:nowrap;position:sticky;top:0;z-index:2}
.week-table thead th:first-child{background:#014545;min-width:76px;text-align:left;padding-left:8px;z-index:3}
.meal-label{font-size:11px;font-weight:700;color:#025857;background:#E2EEE5;padding:6px 8px;white-space:nowrap;vertical-align:top;border-right:2px solid #c5ddd8;border-bottom:1px solid #d8ebe4}
.day-cell{border:1px solid #ebebeb;padding:4px 4px 2px;vertical-align:top;min-width:118px;background:#fff;transition:background .12s,border-color .12s}
.day-cell.drag-over{background:#E2EEE5;border:2px solid #025857}
/* Food chips */
.food-chip{display:flex;align-items:center;gap:2px;padding:2px 4px;margin-bottom:2px;border-radius:5px;background:#f4f4f4;border:1px solid #ebebeb}
.food-chip:hover{background:#E2EEE5;border-color:#c5ddd8}
.chip-name-wrap{position:relative;flex:1;min-width:0}
.chip-inp{width:100%;background:none;border:none;font-size:10px;color:#1a1a1a;padding:0;font-family:inherit;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chip-inp:focus{outline:none;color:#025857;cursor:text}
.chip-g{width:32px;border:none;background:none;font-size:10px;font-weight:700;color:#025857;text-align:right;padding:0;font-family:inherit}
.chip-g:focus{outline:1px solid #025857;border-radius:2px;background:#fff}
.chip-unit{font-size:9px;color:#bbb;flex-shrink:0}
.chip-del{background:none;border:none;cursor:pointer;color:#ccc;font-size:10px;padding:0 1px;flex-shrink:0;line-height:1}
.chip-del:hover{color:#c62828}
.chip-add{background:none;border:1px dashed #d0d0d0;border-radius:4px;cursor:pointer;font-size:11px;color:#bbb;padding:1px 0;width:100%;display:block;margin-top:2px;text-align:center}
.chip-add:hover{color:#025857;border-color:#025857;background:#E2EEE5}
/* Totals row */
.totals-row td{border-top:2px solid #025857;background:#f5faf9;padding:5px 6px;text-align:left;vertical-align:top}
.totals-row .meal-label{font-size:10px;font-weight:600;color:#666;background:#eef5f3}
.tot-kcal{font-size:11px;font-weight:700;white-space:nowrap;text-align:center;margin-bottom:2px}
.tot-kcal.ok{color:#025857}
.tot-kcal.over{color:#B71C1C}
.tot-kcal.low{color:#E65100}
.macro-bar-row{display:flex;align-items:center;gap:2px;margin-top:3px}
.mbr-label{font-size:9px;font-weight:700;width:10px;flex-shrink:0;text-align:center}
.macro-bar{flex:1;height:5px;background:#e4e4e4;border-radius:3px;overflow:hidden}
.macro-bar-fill{height:100%;border-radius:3px}
.mbr-val{font-size:8.5px;color:#555;white-space:nowrap;width:40px;text-align:right;flex-shrink:0}
/* Per-meal macro bar inside each day cell */
.meal-mac-bar{font-size:10px;color:#777;border-top:1px dashed #e0e0e0;margin-top:3px;padding-top:2px;white-space:nowrap;line-height:1.4}
/* Chip dropdown */
.chip-dd{position:absolute;left:0;top:calc(100% + 2px);z-index:9999;background:#fff;border:1px solid #ddd;border-radius:7px;box-shadow:0 4px 16px rgba(0,0,0,.13);min-width:220px;max-height:180px;overflow-y:auto}
.chip-ddi{padding:5px 10px;cursor:pointer;font-size:11px;display:flex;justify-content:space-between;gap:6px;white-space:nowrap}
.chip-ddi:hover{background:#E2EEE5;color:#025857}
.chip-ddm{font-size:9px;color:#bbb}
.chip-ddi:hover .chip-ddm{color:#025857}
/* Food library */
.food-lib{width:185px;flex-shrink:0;background:#fff;border:1px solid #e0e0e0;border-radius:10px;padding:10px;position:sticky;top:0;max-height:92vh;overflow-y:auto}
.food-lib-title{font-size:10px;font-weight:700;color:#025857;margin-bottom:7px;text-transform:uppercase;letter-spacing:.4px}
.food-lib-search{width:100%;padding:5px 8px;border:1px solid #ddd;border-radius:6px;font-size:11px;margin-bottom:7px;font-family:inherit}
.food-lib-search:focus{outline:none;border-color:#025857}
.lib-cat{font-size:9px;font-weight:700;color:#bbb;padding:5px 0 2px;text-transform:uppercase;letter-spacing:.4px}
.lib-item{padding:4px 6px;border-radius:5px;font-size:11px;cursor:grab;display:flex;justify-content:space-between;align-items:center;margin-bottom:1px;border:1px solid transparent;user-select:none}
.lib-item:hover{background:#E2EEE5;color:#025857;border-color:#c5ddd8}
.lib-item:active{cursor:grabbing}
.lib-item.dragging{opacity:.3}
.lib-kcal{font-size:9px;color:#bbb;margin-left:4px;flex-shrink:0}
.chip-ghint{font-size:9px;color:#bbb;margin-left:2px;white-space:nowrap;flex-shrink:0}
/* Recipe modal */
.lib-recipe-btn{background:none;border:none;cursor:pointer;font-size:12px;padding:0 2px;flex-shrink:0;opacity:0.6}
.lib-recipe-btn:hover{opacity:1}
.chip-ingredients-print{display:none}
@media print{
  .chip-ingredients-print{display:block;background:#f9f9f9;border-left:2px solid #ccc;padding:2px 4px;margin:2px 0;border-radius:3px}
  .chip-del{display:none}
  .chip-srv{display:none}
  .chip-add{display:none}
  .combo-save-btn{display:none}
}
.recipe-modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;z-index:99999}
.recipe-modal.hidden{display:none}
.recipe-modal-content{background:#fff;border-radius:12px;padding:20px;max-width:500px;width:90%;max-height:80vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,0.2)}
.recipe-modal-title{font-size:14px;font-weight:700;color:#025857;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center}
.recipe-modal-close{background:none;border:none;cursor:pointer;font-size:18px;color:#999;padding:0;width:24px;height:24px;display:flex;align-items:center;justify-content:center}
.recipe-modal-close:hover{color:#025857}
.recipe-ingredients{display:flex;flex-direction:column;gap:8px}
.recipe-ingredient-row{display:flex;justify-content:space-between;align-items:center;padding:6px 8px;border-radius:6px;background:#f5f5f5;font-size:11px}
.recipe-ingredient-name{flex:1;color:#1a1a1a;font-weight:500}
.recipe-ingredient-qty{color:#025857;font-weight:700;margin-left:8px;white-space:nowrap}
.recipe-ingredient-prep{font-size:10px;color:#999;margin-left:6px;white-space:nowrap}
.recipe-time{margin-top:12px;padding-top:12px;border-top:1px solid #e0e0e0;font-size:11px;color:#666}
/* Empty */
.empty{text-align:center;padding:60px 20px;color:#bbb}
/* Day-targets section */
.day-tgt-wrap{background:#fff;border:1px solid #e0e0e0;border-radius:10px;padding:10px 12px;margin-bottom:12px}
.day-tgt-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.day-tgt-title{font-size:11px;font-weight:700;color:#555}
.day-tgt-reset{border:none;background:none;cursor:pointer;font-size:11px;color:#025857;font-weight:600;padding:0}
.day-tgt-reset:hover{text-decoration:underline}
.day-tgt-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}
.day-tgt-item{display:flex;flex-direction:column;gap:2px;align-items:center}
.day-tgt-item label{font-size:10px;color:#888;font-weight:600}
.day-tgt-item input{width:100%;padding:4px 2px;border-radius:6px;border:1px solid #ddd;font-size:11px;font-weight:700;color:#025857;text-align:center;font-family:inherit}
.day-tgt-item input:focus{outline:none;border-color:#025857}
/* Macro day targets table */
.day-tgt-table{width:100%;border-collapse:collapse;font-size:11px}
.day-tgt-table th{font-size:10px;font-weight:700;color:#888;padding:3px 3px;text-align:center;border-bottom:1px solid #e0e0e0;white-space:nowrap}
.day-tgt-table th:first-child{text-align:left;min-width:64px;padding-left:0}
.day-tgt-table td{padding:2px 2px}
.day-tgt-table td:first-child{font-size:10px;font-weight:700;padding-right:4px;white-space:nowrap}
.mrow-k td:first-child{color:#025857}
.mrow-p td:first-child{color:#1565C0}
.mrow-f td:first-child{color:#e65100}
.mrow-c td:first-child{color:#2e7d32}
.dt-inp{width:100%;padding:3px 2px;border-radius:5px;border:1px solid #ddd;font-size:11px;font-weight:700;text-align:center;font-family:inherit}
.dt-inp:focus{outline:none}
.dt-inp-k{color:#025857}.dt-inp-k:focus{border-color:#025857}
.dt-inp-p{color:#1565C0}.dt-inp-p:focus{border-color:#1565C0}
.dt-inp-f{color:#e65100}.dt-inp-f:focus{border-color:#e65100}
.dt-inp-c{color:#2e7d32}.dt-inp-c:focus{border-color:#2e7d32}
/* Portion button & dropdown */
.chip-srv{background:none;border:1px solid #c5ddd8;border-radius:3px;cursor:pointer;color:#025857;font-size:9px;padding:1px 3px;flex-shrink:0;line-height:1;font-family:inherit}
.chip-srv:hover{background:#E2EEE5}
.srv-ddi{padding:5px 10px;cursor:pointer;font-size:11px;display:flex;justify-content:space-between;gap:8px;white-space:nowrap}
.srv-ddi:hover{background:#E2EEE5;color:#025857}
.srv-ddg{font-size:9px;color:#bbb}
.srv-ddi:hover .srv-ddg{color:#025857}
/* Supplements section in client form */
.supp-wrap{background:#fff;border:1px solid #e0e0e0;border-radius:10px;padding:10px 12px;margin-bottom:12px}
.supp-wrap-title{font-size:11px;font-weight:700;color:#555;margin-bottom:8px}
.supp-cat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px 14px}
.supp-cat-label{font-size:9px;font-weight:700;color:#025857;text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px;padding-bottom:2px;border-bottom:1px solid #E2EEE5}
.supp-item{display:flex;align-items:center;gap:4px;padding:1px 0;cursor:pointer;font-size:11px;color:#333;line-height:1.3}
.supp-item input[type=checkbox]{width:12px;height:12px;accent-color:#025857;cursor:pointer;flex-shrink:0;margin:0}
.supp-dose{font-size:9px;color:#aaa;margin-left:1px}
/* Supplement notes below plan */
.supp-notes{background:#fafaf9;border:1px solid #d4e8e3;border-radius:10px;padding:12px 14px;margin-top:12px}
.supp-notes-hd{font-size:11px;font-weight:700;color:#025857;margin-bottom:8px;text-transform:uppercase;letter-spacing:.4px}
.supp-note-row{display:flex;gap:10px;margin-bottom:5px;align-items:baseline;border-bottom:1px solid #f0f0f0;padding-bottom:4px}
.supp-note-row:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0}
.sntime{font-size:11px;font-weight:700;color:#555;min-width:210px;flex-shrink:0}
.snitems{font-size:11px;color:#333;flex:1;line-height:1.8}
.supp-active{display:inline-flex;align-items:center;gap:2px;background:#e8f5e9;border-radius:4px;padding:1px 4px;margin:1px 2px}
.supp-rm{border:none;background:none;color:#b71c1c;font-size:12px;line-height:1;cursor:pointer;padding:0 1px;opacity:.7}
.supp-rm:hover{opacity:1}
.supp-excl{display:inline-block;color:#bbb;text-decoration:line-through;cursor:pointer;padding:1px 4px;margin:1px 2px;font-size:11px;border-radius:4px}
.supp-excl:hover{background:#f5f5f5;color:#888}
/* Food Exclusion panel */
.excl-wrap{background:#fff;border:1px solid #e0e0e0;border-radius:10px;padding:10px 12px;margin-bottom:12px}
.excl-title{font-size:11px;font-weight:700;color:#555}
.excl-quick-row{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px}
.excl-qbtn{font-size:10px;padding:3px 9px;border-radius:14px;border:1px solid #ccc;background:#f9f9f9;cursor:pointer;color:#555;transition:background .15s,color .15s,border-color .15s;font-family:inherit}
.excl-qbtn:hover{background:#fce4ec;border-color:#ef9a9a;color:#c62828}
.excl-qbtn.active{background:#b71c1c;border-color:#b71c1c;color:#fff}
.excl-search-row{position:relative;margin-bottom:6px}
.excl-inp{width:100%;box-sizing:border-box;border:1px solid #ddd;border-radius:6px;padding:5px 9px;font-size:11px;font-family:inherit;outline:none}
.excl-inp:focus{border-color:#025857}
.excl-sug{position:absolute;top:calc(100% + 2px);left:0;right:0;background:#fff;border:1px solid #ddd;border-radius:6px;box-shadow:0 3px 10px rgba(0,0,0,.12);z-index:200;max-height:160px;overflow-y:auto;display:none}
.excl-sug.open{display:block}
.excl-sug-item{padding:5px 10px;font-size:11px;cursor:pointer;display:flex;justify-content:space-between;align-items:center}
.excl-sug-item:hover{background:#E2EEE5;color:#025857}
.excl-sug-cat{font-size:9px;color:#aaa}
.excl-tags{display:flex;flex-wrap:wrap;gap:4px}
.excl-tag{display:inline-flex;align-items:center;gap:3px;background:#fff3e0;border:1px solid #ffcc80;border-radius:12px;padding:2px 8px 2px 8px;font-size:10px;color:#e65100;white-space:nowrap}
.excl-tag button{border:none;background:none;color:#e65100;font-size:12px;cursor:pointer;padding:0 1px;line-height:1;opacity:.7;font-family:inherit}
.excl-tag button:hover{opacity:1}
.excl-clear{font-size:10px;color:#aaa;cursor:pointer;padding:1px 4px;border:none;background:none;font-family:inherit;margin-left:auto}
.excl-clear:hover{color:#b71c1c}
/* Saved Combos */
.combo-section{margin-bottom:8px;padding-bottom:8px;border-bottom:1px solid #f0f0f0}
.combo-sec-title{font-size:9px;font-weight:700;color:#e65100;text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px}
.combo-item{padding:4px 6px;border-radius:5px;font-size:10px;cursor:grab;display:flex;align-items:center;gap:3px;margin-bottom:1px;border:1px solid #ffe0b2;background:#fff8f0;user-select:none}
.combo-item:hover{background:#fff3e0;border-color:#ffb74d}
.combo-item:active{cursor:grabbing}
.combo-item.dragging{opacity:.3}
.combo-name{flex:1;font-weight:600;color:#bf360c;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.combo-count{font-size:9px;color:#bbb;flex-shrink:0}
.combo-del{border:none;background:none;cursor:pointer;color:#ccc;font-size:11px;padding:0 2px;line-height:1;flex-shrink:0}
.combo-del:hover{color:#c62828}
.combo-preview{font-size:9px;color:#999;padding:0 6px 3px;line-height:1.5}
.combo-save-btn{background:none;border:1px dashed #e0c9a0;border-radius:4px;cursor:pointer;font-size:10px;color:#bbb;padding:2px 0;margin-top:2px;display:block;width:100%;text-align:center;font-family:inherit}
.combo-save-btn:hover{color:#e65100;border-color:#e65100;background:#fff8f0}
/* Totals target indicator */
.tot-pct{font-size:9px;margin-top:1px;font-weight:600}
.tot-pct.ok{color:#025857}
.tot-pct.over{color:#B71C1C}
.tot-pct.low{color:#E65100}
/* Template editor */
.sb-sep{height:1px;background:#e0e0e0;margin:10px 8px}
.tmpl-sb-btn{display:block;width:calc(100% - 16px);margin:4px 8px;padding:7px 10px;background:#f0f7f7;border:1px solid #b2d8d8;border-radius:6px;font-size:11px;color:#025857;font-weight:600;cursor:pointer;text-align:left}
.tmpl-sb-btn:hover,.tmpl-sb-btn.active{background:#025857;color:#fff;border-color:#025857}
.tmpl-goal-tabs{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:10px}
.tmpl-goal-tab{flex:1;min-width:80px;padding:5px 4px;font-size:10px;font-weight:600;border:1px solid #ccc;border-radius:5px;background:#f5f5f5;color:#555;cursor:pointer;text-align:center}
.tmpl-goal-tab.active{background:#025857;color:#fff;border-color:#025857}
.tmpl-info{font-size:10px;color:#888;margin-bottom:8px;font-style:italic}
.tmpl-reset-btn{padding:5px 10px;font-size:10px;border:1px solid #e57373;color:#c62828;background:#fff;border-radius:5px;cursor:pointer}
.tmpl-reset-btn:hover{background:#ffebee}
.tmpl-save-btn{padding:5px 12px;font-size:10px;border:none;color:#fff;background:#025857;border-radius:5px;cursor:pointer;font-weight:600}
.tmpl-save-btn:hover{background:#014545}
/* ── Training day toggle ── */
.train-row td:first-child{color:#025857;font-weight:700;font-size:10px}
.train-tog{padding:2px 7px;border-radius:12px;border:none;cursor:pointer;font-size:10px;font-weight:700;transition:all .15s}
.train-t{background:#025857;color:#fff}
.train-r{background:#eee;color:#aaa}
.train-tog:hover{opacity:.82}
.hrs-row td:first-child{color:#888;font-size:10px}
.hrs-inp{width:100%;padding:2px 1px;border-radius:5px;border:1px solid #ddd;font-size:10px;font-weight:700;text-align:center;font-family:inherit;background:#f9f9f9}
.hrs-t{border-color:#025857;color:#025857;background:#f0f8f7}
.hrs-r{color:#ccc;background:#f5f5f5}
.carb-boost-row{display:flex;align-items:center;gap:6px;font-size:10px;color:#666;margin-top:5px}
.carb-boost-row label{white-space:nowrap}
.carb-boost-inp{width:44px;padding:2px 4px;border:1px solid #ddd;border-radius:4px;font-size:11px;font-weight:700;color:#025857;text-align:center}
/* ── Formula selector ── */
.formula-row{display:flex;align-items:center;gap:10px;margin-bottom:4px}

/* ── Autosave system ──────────────────────────────────────────────────────────
   save()     = debounced 800ms — καλείται σε κάθε αλλαγή, δεν σπαταλά πόρους
   saveNow()  = άμεσα — για import/backup, beforeunload
   Toast "✓ Αποθηκεύτηκε" εμφανίζεται μετά από κάθε αποθήκευση
*/
var _saveTimer=null;
function _doSave(){
  try{localStorage.setItem('fyh_clients',JSON.stringify(clients));}catch(e){}
  try{localStorage.setItem('fyh_custom_tmpls',JSON.stringify(customTemplates));}catch(e){}
  var t=document.getElementById('autosave-toast');
  if(t){t.style.opacity='1';clearTimeout(t._ft);t._ft=setTimeout(function(){t.style.opacity='0';},1600);}
}
function save(){clearTimeout(_saveTimer);_saveTimer=setTimeout(_doSave,800);}
function saveNow(){clearTimeout(_saveTimer);_doSave();}
window.addEventListener('beforeunload',function(){saveNow();});

function cm(n,g){var f=FOODS[n]||{k:0,p:0,c:0,f:0,fi:0};return{k:+(g/100*f.k).toFixed(1),p:+(g/100*f.p).toFixed(1),f:+(g/100*f.f).toFixed(1),c:+(g/100*f.c).toFixed(1),fi:+(g/100*(f.fi||0)).toFixed(1)};}
/* Fiber target (g/day) — DRI Adequate Intake by age & sex */
function getFiberTarget(age,sex){
  age=age||30;sex=sex||'M';
  if(age<4)return 19;
  if(age<9)return 25;
  if(age<14)return sex==='M'?31:26;
  if(age<19)return sex==='M'?38:26;
  if(sex==='M')return age<=50?38:30;
  return age<=50?25:21;
}
function calcMETkcal(c){
  // Returns weekly, daily avg, perTrainDay, and byDay[0..6] exercise kcal
  // Formula: kcal/session = MET × 3.5 × weight(kg) / 200 × duration(min)
  if(!c.metActivities||!c.metActivities.length)return{weekly:0,daily:0,perTrainDay:0,byDay:[0,0,0,0,0,0,0]};
  var weekly=0;
  var byDay=[0,0,0,0,0,0,0];
  c.metActivities.forEach(function(ma){
    var kcalSess=ma.met*3.5*(c.weight||80)/200*ma.mins;
    // New format: ma.days = [0,2,4] specific day indices
    // Old format: ma.daysPerWeek = number (backward compat)
    var dList=ma.days;
    if(!dList){
      // Backward compat: spread over first N train days, or just first N days
      var n=ma.daysPerWeek||3;
      dList=[];
      var td=c.trainDays||[];
      for(var i=0;i<7&&dList.length<n;i++){if(td[i])dList.push(i);}
      if(!dList.length){for(var i=0;i<n&&i<7;i++)dList.push(i);}
    }
    dList.forEach(function(d){byDay[d]+=kcalSess;weekly+=kcalSess;});
  });
  var numTrainDays=(c.trainDays||[]).filter(function(x){return x;}).length;
  var perTrainDay=numTrainDays>0?Math.round(weekly/numTrainDays):Math.round(weekly/7);
  return{weekly:Math.round(weekly),daily:Math.round(weekly/7),perTrainDay:perTrainDay,
    byDay:byDay.map(function(k){return Math.round(k);})};
}

function calcTDEE(c){
  var bmr;
  var isMinor=(c.age||0)<18;
  var growthAdd=0;
  if(isMinor){
    // Schofield (1985) equations — validated for children/adolescents; Mifflin is NOT valid under 18
    var w=c.weight||60;
    if(c.sex==='M'){
      if(c.age<3)bmr=60.9*w-54;
      else if(c.age<10)bmr=22.7*w+495;
      else bmr=17.5*w+651;
    } else {
      if(c.age<3)bmr=61.0*w-51;
      else if(c.age<10)bmr=22.5*w+499;
      else bmr=12.2*w+746;
    }
    bmr=Math.round(bmr);
    // DRI growth allowance on top of activity needs (not BMR)
    growthAdd=c.age<11?100:(c.age<15?150:200);
  } else if(c.formula==='cunningham'&&c.lbm>0){
    // Cunningham: more accurate for athletes — uses lean body mass
    bmr=500+22*c.lbm;
  } else {
    // Mifflin-St Jeor (default)
    bmr=c.sex==='M'?10*c.weight+6.25*c.height-5*c.age+5:10*c.weight+6.25*c.height-5*c.age-161;
  }
  var tdee;
  var metKcal=calcMETkcal(c);
  var usedMET=c.metActivities&&c.metActivities.length>0;
  if(usedMET){
    // MET-based: TDEE = BMR × 1.2 (NEAT/daily movement) + daily average exercise kcal
    tdee=Math.round(bmr*1.2+metKcal.daily);
  } else {
    var act={sed:1.2,light:1.375,mod:1.55,active:1.725};
    tdee=Math.round(bmr*(act[c.activity]||1.2));
  }
  var def={mild:-250,loss:-500,maintain:0,gain:300};
  var goalDelta=def[c.goal]||0;
  var target=tdee+goalDelta+growthAdd;
  // Per-day MET targets: each day gets its own exercise kcal based on assigned activities
  var baseTDEE=Math.round(bmr*1.2);
  var restTarget=usedMET?baseTDEE+goalDelta+growthAdd:target;
  var trainTarget=usedMET?baseTDEE+metKcal.perTrainDay+goalDelta+growthAdd:target;
  var trainTargetByDay=[];
  for(var tdi=0;tdi<7;tdi++){
    trainTargetByDay.push(usedMET?Math.round(baseTDEE+metKcal.byDay[tdi]+goalDelta+growthAdd):target);
  }
  // Hydration: weight×35ml base; +500ml per training hour on training days
  var baseHydration=Math.round(c.weight*35);
  // Use max hours across training days for the "training day" hydration guide
  var maxTrainHrs=0;
  if(c.trainHoursByDay){
    for(var hxi=0;hxi<7;hxi++){if(c.trainDays&&c.trainDays[hxi]&&(c.trainHoursByDay[hxi]||0)>maxTrainHrs)maxTrainHrs=c.trainHoursByDay[hxi];}
  }
  if(maxTrainHrs===0)maxTrainHrs=c.trainHoursPerDay||1;
  var trainHydration=Math.round(baseHydration+maxTrainHrs*500);
  // Macro split from preset (default 25/25/50)
  var pPct=(c.macroP!=null?c.macroP:25)/100;
  var fPct=(c.macroF!=null?c.macroF:25)/100;
  var cPct=(c.macroC!=null?c.macroC:50)/100;
  var protG=Math.round(target*pPct/4);
  var protGperKg=c.weight>0?+(protG/c.weight).toFixed(2):0;
  // Energy Availability = (intake - exercise kcal) / LBM — RED-S screening
  var lbmForEA=c.lbm>0?c.lbm:0;
  if(!lbmForEA&&c.weightLog&&c.weightLog.length){
    var lastWL=c.weightLog.slice().sort(function(a,b){return b.date>a.date?1:-1;})[0];
    if(lastWL&&lastWL.bf>0)lbmForEA=+(lastWL.weight*(1-lastWL.bf/100)).toFixed(1);
  }
  // Fallback: use BF% from client profile if still no LBM
  if(!lbmForEA&&(c.bf||0)>0)lbmForEA=+((c.weight||80)*(1-(c.bf/100))).toFixed(1);
  var ea=null;
  if(lbmForEA>0&&metKcal.daily>0)ea=+((target-metKcal.daily)/lbmForEA).toFixed(1);
  return{bmr:Math.round(bmr),tdee:tdee,target:target,
    restTarget:restTarget,trainTarget:trainTarget,trainTargetByDay:trainTargetByDay,
    p:protG,f:Math.round(target*fPct/9),carb:Math.round(target*cPct/4),
    pPct:Math.round(pPct*100),fPct:Math.round(fPct*100),cPct:Math.round(cPct*100),
    hydBase:baseHydration,hydTrain:trainHydration,
    exerciseDaily:metKcal.daily,exerciseWeekly:metKcal.weekly,
    perTrainDay:metKcal.perTrainDay,byDay:metKcal.byDay,usedMET:usedMET,
    isMinor:isMinor,growthAdd:growthAdd,
    protGperKg:protGperKg,ea:ea,lbmForEA:lbmForEA};
}

var TMPLS=JSON.parse(JSON.stringify(DEFAULT_TMPLS));

// Maps each food category to the macro it primarily contributes
// Used by scalePlan for per-macro scaling
var MACRO_TYPE={
  'Κρέας':'p','Ψάρια':'p','Αυγά/Γαλακτ.':'p',
  'Δημητριακά':'c','Φρούτα':'c',
  'Λάδια':'f','Ξηροί καρποί':'f'
  // Λαχανικά, Όσπρια, Συνταγές FYH, Άλλα → fallback to calorie ratio
};

function scalePlan(tmpl,tgt){
  var p=JSON.parse(JSON.stringify(tmpl)),tot={k:0,pt:0,f:0,c:0};
  p.forEach(function(m){m.foods.forEach(function(f){var v=cm(f.n,f.g);tot.k+=v.k;tot.pt+=v.p;tot.f+=v.f;tot.c+=v.c;});});
  if(!tot.k)return p;

  var targetK=(typeof tgt==='object'&&tgt)?(tgt.k||tot.k):(tgt||tot.k);
  var targetP=(typeof tgt==='object'&&tgt&&tgt.p)?tgt.p:0;
  var targetF=(typeof tgt==='object'&&tgt&&tgt.f)?tgt.f:0;
  var targetC=(typeof tgt==='object'&&tgt&&tgt.c)?tgt.c:0;

  // Base calorie ratio (fallback for mixed/uncategorised foods)
  var ratioK=targetK/tot.k;
  // Per-macro ratios — each food group scales to hit its own macro target
  // Falls back to ratioK if no target or no template quantity for that macro
  var ratioP=(targetP>0&&tot.pt>0)?targetP/tot.pt:ratioK;
  var ratioC=(targetC>0&&tot.c>0)?targetC/tot.c:ratioK;
  var ratioF=(targetF>0&&tot.f>0)?targetF/tot.f:ratioK;

  p.forEach(function(m){
    m.foods.forEach(function(f){
      var cat=FOODS[f.n]?FOODS[f.n].cat:'';
      var mt=MACRO_TYPE[cat]||'k';
      var r=mt==='p'?ratioP:mt==='c'?ratioC:mt==='f'?ratioF:ratioK;
      // Hard caps for foods that should never scale too far
      // (olive oil, nuts, vegetables — palatability limits)
      var cap=SCALE_CATS[cat];
      if(cap)r=Math.min(cap.hi,Math.max(cap.lo,r));
      f.g=Math.max(5,Math.round(f.g*r));
    });
  });
  return p;
}

function renderTmplTable(){
  var con=document.getElementById('tmpl-con');if(!con)return;
  var tmpl=TMPLS[curTmplGoal];
  var mealNames=tmpl[0].map(function(m){return m.name;});
  var html='<table class="week-table"><thead><tr><th>Γεύμα</th>';
  DAYS.forEach(function(d){html+='<th>'+d+'</th>';});
  html+='</tr></thead><tbody>';
  for(var mi=0;mi<mealNames.length;mi++){
    html+='<tr><td class="meal-label">'+mealNames[mi]+'</td>';
    for(var d=0;d<7;d++){
      var foods=tmpl[d][mi]?tmpl[d][mi].foods:[];
      html+='<td class="day-cell tmpl-cell" data-d="'+d+'" data-mi="'+mi+'">';
      foods.forEach(function(food,fi){
        var tfu=FOOD_UNITS[food.n];
        var tVal=tfu?Math.max(1,Math.round(food.g/tfu.g)):food.g;
        var tMax=tfu?10:999;
        var tUnit=tfu?tfu.u:'g';
        var tChg=tfu?'tmplUpdG('+d+','+mi+','+fi+',this.value*'+tfu.g+')'
          :'tmplUpdG('+d+','+mi+','+fi+',this.value)';
        html+='<div class="food-chip">'
          +'<div class="chip-name-wrap">'
          +'<input class="chip-inp" type="text" value="'+food.n+'" autocomplete="off" spellcheck="false"'
          +' data-d="'+d+'" data-mi="'+mi+'" data-fi="'+fi+'" data-mode="tmpl"'
          +' oninput="showChipSug(this)" onfocus="showChipSug(this)" onblur="closeDD()">'
          +'</div>'
          +'<input class="chip-g" type="number" min="0" max="'+tMax+'" value="'+tVal+'" onchange="'+tChg+'">'
          +'<span class="chip-unit">'+tUnit+'</span>'
          +'<button class="chip-del" onclick="tmplDelF('+d+','+mi+','+fi+')">&#10005;</button>'
          +'</div>';
      });
      html+='<button class="chip-add" onclick="tmplAddF('+d+','+mi+')">+</button></td>';
    }
    html+='</tr>';
  }
  html+='</tbody></table>';
  con.innerHTML=html;
  // drag-drop: drop food library item onto template cell
  con.querySelectorAll('.tmpl-cell').forEach(function(cell){
    cell.addEventListener('dragover',function(e){e.preventDefault();cell.classList.add('drag-over');});
    cell.addEventListener('dragleave',function(e){if(!cell.contains(e.relatedTarget))cell.classList.remove('drag-over');});
    cell.addEventListener('drop',function(e){
      e.preventDefault();cell.classList.remove('drag-over');
      var name=e.dataTransfer.getData('text/plain');
      if(!name||!FOODS[name])return;
      var dd=parseInt(cell.dataset.d),mmi=parseInt(cell.dataset.mi);
      TMPLS[curTmplGoal][dd][mmi].foods.push({n:name,g:100});
      renderTmplTable();
    });
  });
}

function tmplUpdG(d,mi,fi,v){TMPLS[curTmplGoal][d][mi].foods[fi].g=Math.max(0,parseInt(v)||0);}
function tmplAddF(d,mi){TMPLS[curTmplGoal][d][mi].foods.push({n:Object.keys(FOODS)[0],g:100});renderTmplTable();}
function tmplDelF(d,mi,fi){TMPLS[curTmplGoal][d][mi].foods.splice(fi,1);renderTmplTable();}

function makeDayTgtDefaults(c,t){
  var boost=(c.carbBoost||20)/100;
  var baseHrs=c.trainHoursPerDay||1;
  var r=[];
  for(var i=0;i<7;i++){
    var isT=c.trainDays&&c.trainDays[i];
    // Per-day hours: use trainHoursByDay if set, otherwise fallback to global trainHoursPerDay
    var dayHrs=(c.trainHoursByDay&&c.trainHoursByDay[i]!=null)?c.trainHoursByDay[i]:(isT?baseHrs:0);
    var hScale=(isT&&baseHrs>0)?(dayHrs/baseHrs):0;
    var extraC=isT?Math.round(t.carb*boost*(t.usedMET?1:hScale)):0;
    // MET active: use precise per-day kcal from assigned activities
    var dayKcal;
    if(t.usedMET){
      dayKcal=t.trainTargetByDay?t.trainTargetByDay[i]:t.restTarget;
    } else {
      dayKcal=t.target;
    }
    r.push({k:dayKcal+extraC*4,p:t.p,f:t.f,c:t.carb+extraC});
  }
  return r;
}
function getDayTgtEff(c,t){
  var eff=c.dayTargets;
  if(!eff)return makeDayTgtDefaults(c,t);
  // migrate old format (array of numbers)
  if(typeof eff[0]==='number')return eff.map(function(k){return{k:k,p:Math.round(k*.25/4),f:Math.round(k*.25/9),c:Math.round(k*.5/4)};});
  return eff;
}

      +'</div>';
  }

  var dAbbrAdd=['Δευ','Τρι','Τετ','Πεμ','Παρ','Σαβ','Κυρ'];

  dAbbrAdd.forEach(function(a,i){
    dayToggles+='<button type="button" class="met-day-btn" id="met-day-'+i+'" onclick="toggleMetDay('+i+')">'+a+'</button>';
  });
  dayToggles+='</div>';

  return '<div class="met-wrap">'
    +'<div class="met-head">'
    +'<span class="met-title">⚡ Αθλητική δραστηριότητα (MET-based)</span>'
    +(useMET?'<span class="met-badge">MET ✓ ενεργό</span>':'')

function metCatChange(){
  var catIdx=parseInt(document.getElementById('met-cat').value)||0;
  var sel=document.getElementById('met-act');
  if(!sel)return;
  sel.innerHTML='';
  (MET_ACTIVITIES[catIdx]||MET_ACTIVITIES[0]).items.forEach(function(a){
    var opt=document.createElement('option');
    opt.value=a.id;
    opt.textContent=a.name+' — '+a.met+' METs';
    sel.appendChild(opt);
  });
}

function toggleMetDay(d){
  var btn=document.getElementById('met-day-'+d);
  if(!btn)return;
  btn.classList.toggle('met-day-on');
}

function addMetActivity(){
  var c=getC();if(!c)return;
  if(!c.metActivities)c.metActivities=[];
  var catIdx=parseInt(document.getElementById('met-cat').value)||0;
  var actId=document.getElementById('met-act').value;
  var mins=parseInt(document.getElementById('met-mins').value)||60;
  // Collect selected days
  var days=[];
  for(var d=0;d<7;d++){
    var btn=document.getElementById('met-day-'+d);
    if(btn&&btn.classList.contains('met-day-on'))days.push(d);
  }
  if(!days.length){alert('Επίλεξε τουλάχιστον μία ημέρα!');return;}
  var found=null;
  (MET_ACTIVITIES[catIdx]||MET_ACTIVITIES[0]).items.forEach(function(a){if(a.id===actId)found=a;});
  if(!found)return;
  c.metActivities.push({id:found.id,name:found.name,met:found.met,mins:mins,days:days});
  // Auto-mark days as training days and sync hours
  if(!c.trainDays)c.trainDays=[false,false,false,false,false,false,false];
  if(!c.trainHoursByDay)c.trainHoursByDay=[0,0,0,0,0,0,0];
  days.forEach(function(d){
    c.trainDays[d]=true;
    c.trainHoursByDay[d]=Math.max(c.trainHoursByDay[d],+(mins/60).toFixed(1));
  });
  c.dayTargets=null; // recalculate
  save();renderMain();
}

function removeMetActivity(idx){
  var c=getC();if(!c||!c.metActivities)return;
  c.metActivities.splice(idx,1);
  c.dayTargets=null; // recalculate
  save();renderMain();
}

function buildWeightChart(log){
  if(log.length<2)return'';
  var sorted=log.slice().sort(function(a,b){return a.date<b.date?-1:1;});
  var weights=sorted.map(function(e){return e.weight;});
  var bfArr=sorted.map(function(e){return(e.bf>0)?e.bf:null;});
  var hasBF=bfArr.some(function(v){return v!==null;});
  var n=weights.length;
  var minW=Math.min.apply(null,weights),maxW=Math.max.apply(null,weights),rangeW=maxW-minW||1;
  var W=540,H=100,pL=hasBF?10:8,pR=hasBF?38:8,pT=14,pB=22;
  var cW=W-pL-pR,cH=H-pT-pB;
  function xp(i){return pL+i/(n>1?n-1:1)*cW;}
  function yw(w){return pT+cH-(w-minW)/rangeW*cH;}
  var ptsW=weights.map(function(w,i){return xp(i).toFixed(1)+','+yw(w).toFixed(1);});
  var dotsW='';
  sorted.forEach(function(e,i){
    dotsW+='<circle cx="'+xp(i).toFixed(1)+'" cy="'+yw(e.weight).toFixed(1)+'" r="3" fill="#025857" stroke="#fff" stroke-width="1.5"/>';
  });
  // Weight Y-axis labels (left)
  var yAxis='<text x="'+(pL-2)+'" y="'+(pT+5)+'" fill="#025857" font-size="7.5" font-family="sans-serif" text-anchor="end">'+maxW+'</text>'
    +'<text x="'+(pL-2)+'" y="'+(pT+cH)+'" fill="#025857" font-size="7.5" font-family="sans-serif" text-anchor="end">'+minW+'</text>'
    +'<line x1="'+pL+'" y1="'+pT+'" x2="'+pL+'" y2="'+(pT+cH)+'" stroke="#025857" stroke-width="0.5" opacity="0.4"/>';
  // BF% axis + line
  var bfSvg='',bfStats='';
  if(hasBF){
    var bfVals=bfArr.filter(function(v){return v!==null;});
    var minBF=Math.min.apply(null,bfVals),maxBF=Math.max.apply(null,bfVals),rangeBF=maxBF-minBF||1;
    function yb(v){return pT+cH-(v-minBF)/rangeBF*cH;}
    // Build segments (skip nulls)
    var segs=[],seg=[];
    sorted.forEach(function(e,i){
      if(e.bf>0){seg.push(xp(i).toFixed(1)+','+yb(e.bf).toFixed(1));}
      else if(seg.length){segs.push(seg.slice());seg=[];}
    });
    if(seg.length)segs.push(seg);
    segs.forEach(function(s){
      if(s.length>1)bfSvg+='<polyline points="'+s.join(' ')+'" fill="none" stroke="#1565C0" stroke-width="2" stroke-dasharray="5,2.5" stroke-linejoin="round"/>';
    });
    // BF dots
    sorted.forEach(function(e,i){
      if(e.bf>0)bfSvg+='<circle cx="'+xp(i).toFixed(1)+'" cy="'+yb(e.bf).toFixed(1)+'" r="2.5" fill="#1565C0" stroke="#fff" stroke-width="1"/>';
    });
    // Right Y axis
    bfSvg+='<line x1="'+(W-pR)+'" y1="'+pT+'" x2="'+(W-pR)+'" y2="'+(pT+cH)+'" stroke="#1565C0" stroke-width="0.5" opacity="0.4"/>';
    bfSvg+='<text x="'+(W-pR+3)+'" y="'+(pT+5)+'" fill="#1565C0" font-size="7.5" font-family="sans-serif">'+maxBF+'%</text>';
    bfSvg+='<text x="'+(W-pR+3)+'" y="'+(pT+cH)+'" fill="#1565C0" font-size="7.5" font-family="sans-serif">'+minBF+'%</text>';
    // BF stats
    if(bfVals.length>=2){
      var bfDiff=+(bfVals[bfVals.length-1]-bfVals[0]).toFixed(1);
      var bfCol=bfDiff<0?'#2e7d32':'#c62828';
      bfStats='<span>%BF: <b style="color:'+bfCol+'">'+(bfDiff>0?'+':'')+bfDiff+'%</b></span>';
      // LBM change using first and last entries that have bf
      var bfEntries=sorted.filter(function(e){return e.bf>0;});
      var lbmFirst=+(bfEntries[0].weight*(1-bfEntries[0].bf/100)).toFixed(1);
      var lbmLast=+(bfEntries[bfEntries.length-1].weight*(1-bfEntries[bfEntries.length-1].bf/100)).toFixed(1);
      var lbmDiff=+(lbmLast-lbmFirst).toFixed(1);
      bfStats+='<span>LBM: <b style="color:'+(lbmDiff>0?'#1565C0':'#888')+'">'+(lbmDiff>0?'+':'')+lbmDiff+' kg</b></span>';
    }
  }
  var firstW=weights[0],lastW=weights[n-1];
  var diff=+(lastW-firstW).toFixed(1);
  var diffCol=diff<0?'#2e7d32':diff>0?'#c62828':'#888';
  var legend='<span style="display:inline-flex;align-items:center;gap:3px"><svg width="16" height="5" style="flex-shrink:0"><line x1="0" y1="2.5" x2="16" y2="2.5" stroke="#025857" stroke-width="2.5"/></svg>Βάρος kg</span>';
  if(hasBF)legend+='<span style="display:inline-flex;align-items:center;gap:3px"><svg width="16" height="5" style="flex-shrink:0"><line x1="0" y1="2.5" x2="16" y2="2.5" stroke="#1565C0" stroke-width="2" stroke-dasharray="5,2.5"/></svg>%BF</span>';
  return '<div class="weight-chart-wrap">'
    +'<svg width="100%" viewBox="0 0 '+W+' '+H+'" preserveAspectRatio="none" style="height:'+H+'px;display:block">'
    +yAxis
    +'<polyline points="'+ptsW.join(' ')+'" fill="none" stroke="#025857" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>'
    +dotsW+bfSvg
    +'</svg>'
    +'<div class="weight-chart-stats">'
    +legend
    +'<span style="border-left:1px solid #ddd;padding-left:10px">Βάρος: <b style="color:'+diffCol+'">'+(diff>0?'+':'')+diff+' kg</b></span>'
    +bfStats
    +'<span>Min: <b>'+minW+'</b> Max: <b>'+maxW+' kg</b></span>'
    +'<span style="color:#aaa">'+n+' μετρήσεις</span>'
    +'</div>'
    +'</div>';
}

/* ── Skinfold Calculator ─────────────────────────────────────────────────── */
function calcSkinfoldBF(protocol,sex,age,fields){
  var bf=null,bd=null,sum=0;
  if(protocol==='jp5'){
    // JP 5-site: τρικέφαλος + υποπλάτιο + κοιλιά + υπερλαγόνιο + μηρός
    // Jackson & Pollock (1978/1980) — regression BD → Siri %BF
    sum=(fields.tricep||0)+(fields.subscapular||0)+(fields.abdomen||0)+(fields.suprailiac||0)+(fields.thigh||0);
    if(sum>0){
      if(sex==='M') bd=1.112-0.00043499*sum+0.00000055*sum*sum-0.00028826*age;
      else bd=1.097-0.00046971*sum+0.00000056*sum*sum-0.00012828*age;
      bf=(4.95/bd-4.50)*100;
    }
  } else if(protocol==='jp3'){
    if(sex==='M') sum=(fields.chest||0)+(fields.abdomen||0)+(fields.thigh||0);
    else sum=(fields.tricep||0)+(fields.suprailiac||0)+(fields.thigh||0);
    if(sum>0){
      if(sex==='M') bd=1.10938-0.0008267*sum+0.0000016*sum*sum-0.0002574*age;
      else bd=1.0994921-0.0009929*sum+0.0000023*sum*sum-0.0001392*age;
      bf=(4.95/bd-4.50)*100;
    }
  } else if(protocol==='jp7'){
    sum=(fields.chest||0)+(fields.midaxillary||0)+(fields.tricep||0)+(fields.subscapular||0)+(fields.abdomen||0)+(fields.suprailiac||0)+(fields.thigh||0);
    if(sum>0){
      if(sex==='M') bd=1.112-0.00043499*sum+0.00000055*sum*sum-0.00028826*age;
      else bd=1.097-0.00046971*sum+0.00000056*sum*sum-0.00012828*age;
      bf=(4.95/bd-4.50)*100;
    }
  } else if(protocol==='slaughter'){
    sum=(fields.tricep||0)+(fields.calf||0);
    if(sum>0){
      if(sex==='M') bf=sum<=35?0.735*sum+1.0:0.546*sum+9.7;
      else bf=0.610*sum+5.1;
    }
  }
  if(bf!==null) bf=Math.max(3,Math.min(60,+bf.toFixed(1)));
  return{bf:bf,bd:bd?+bd.toFixed(5):null,sum:sum};
}

function toggleSkinfoldPanel(){

  if(!isOpen)updateSkinfoldFields();
}

function updateSkinfoldCalc(){
  var c=getC();if(!c)return;
  var protoEl=document.getElementById('sf-proto');
  if(!protoEl)return;
  var p=protoEl.value;
  var sex=c.sex||'M';
  var age=c.age||25;
  var wInp=document.getElementById('tr-weight');
  var weight=wInp?parseFloat(wInp.value)||0:c.weight||0;
  var fields={};
  ['chest','abdomen','thigh','tricep','suprailiac','midaxillary','subscapular','calf'].forEach(function(k){
    var el=document.getElementById('sf-'+k);
    if(el&&el.value)fields[k]=parseFloat(el.value)||0;
  });
  var res=calcSkinfoldBF(p,sex,age,fields);

function setTrainDay(d,isT){
  var c=getC();if(!c)return;
  if(!c.trainDays)c.trainDays=[false,false,false,false,false,false,false];
  c.trainDays[d]=isT;
  // Sync hours: when marking as T restore default hours; when R set to 0
  if(!c.trainHoursByDay)c.trainHoursByDay=[1,1,1,1,1,1,1];
  if(isT&&c.trainHoursByDay[d]===0)c.trainHoursByDay[d]=c.trainHoursPerDay||1;
  if(!isT)c.trainHoursByDay[d]=0;
  var t=calcTDEE(c);
  if(!c.dayTargets||typeof c.dayTargets[0]==='number')c.dayTargets=makeDayTgtDefaults(c,t);
  // Recalculate this day using per-day hours
  var baseHrs=c.trainHoursPerDay||1;
  var dayHrs=c.trainHoursByDay[d];
  var hScale=(isT&&baseHrs>0)?(dayHrs/baseHrs):0;
  var boost=(c.carbBoost||20)/100;
  var extraC=isT?Math.round(t.carb*boost*hScale):0;
  var dayKcal=t.usedMET?Math.round(t.restTarget+(t.trainTarget-t.restTarget)*hScale):t.target;
  c.dayTargets[d].c=t.carb+extraC;
  c.dayTargets[d].k=dayKcal+extraC*4;
  var kinp=document.getElementById('dt-k-'+d);if(kinp)kinp.value=c.dayTargets[d].k;
  var cinp=document.getElementById('dt-c-'+d);if(cinp)cinp.value=c.dayTargets[d].c;
  // Update hours input appearance
  var hInp=document.getElementById('hrs-'+d);
  if(hInp){hInp.value=c.trainHoursByDay[d];hInp.className='dt-inp hrs-inp '+(isT?'hrs-t':'hrs-r');}
  buildDayTgtHtml(c,t);
  renderMain();
}

function setTrainHours(d,v){
  var c=getC();if(!c)return;
  if(!c.trainHoursByDay)c.trainHoursByDay=[1,1,1,1,1,1,1];
  var hrs=Math.max(0,Math.min(8,parseFloat(v)||0));
  c.trainHoursByDay[d]=hrs;
  // Also update global trainHoursPerDay as the average of active days (for backward compat)
  var t=calcTDEE(c);
  if(!c.dayTargets||typeof c.dayTargets[0]==='number')c.dayTargets=makeDayTgtDefaults(c,t);
  var isT=c.trainDays&&c.trainDays[d];
  var baseHrs=c.trainHoursPerDay||1;
  var hScale=(isT&&baseHrs>0)?(hrs/baseHrs):0;
  var boost=(c.carbBoost||20)/100;
  var extraC=isT?Math.round(t.carb*boost*hScale):0;
  var dayKcal=t.usedMET?Math.round(t.restTarget+(t.trainTarget-t.restTarget)*hScale):t.target;
  c.dayTargets[d].c=t.carb+extraC;
  c.dayTargets[d].k=dayKcal+extraC*4;
  var kinp=document.getElementById('dt-k-'+d);if(kinp)kinp.value=c.dayTargets[d].k;
  var cinp=document.getElementById('dt-c-'+d);if(cinp)cinp.value=c.dayTargets[d].c;
  save();
  renderStats();
}

function applyFoodExclusions(tmplDays,excludeList){
  if(!excludeList||!excludeList.length)return tmplDays;
  var result=JSON.parse(JSON.stringify(tmplDays));
  result.forEach(function(meals){
    meals.forEach(function(meal){
      meal.foods=meal.foods.map(function(food){
        if(excludeList.indexOf(food.n)===-1)return food;
        var cat=FOODS[food.n]?FOODS[food.n].cat:'';
        var order=SUBST_ORDER[cat]||[cat];
        var sub=null;
        for(var i=0;i<order.length&&!sub;i++){
          var candidates=Object.keys(FOODS).filter(function(n){
            return FOODS[n].cat===order[i]&&excludeList.indexOf(n)===-1;
          });
          if(candidates.length){
            var origDens=FOODS[food.n]?FOODS[food.n].k:100;
            candidates.sort(function(a,b){return Math.abs(FOODS[a].k-origDens)-Math.abs(FOODS[b].k-origDens);});
            sub=candidates[0];
          }
        }
        if(sub){
          var origK=FOODS[food.n]?FOODS[food.n].k:100;
          var subK=FOODS[sub].k||100;
          return{n:sub,g:Math.max(10,Math.round(food.g*(origK/subK)))};
        }
        return food;
      });
    });
  });
  return result;
}

    +'<div class="excl-sug" id="excl-sug"></div>'

    +(hasExcl?'<div class="excl-tags">'+tags+'</div>':'<div style="font-size:10px;color:#bbb;margin-top:2px">Κανένα τρόφιμο αποκλεισμένο — χρησιμοποιούνται όλα</div>')

    s.timing.forEach(function(ti){

      var key=id+'|'+ti.t;
      var excluded=c.suppExclude.indexOf(key)>-1;
      var label=s.name+(ti.d?' ('+ti.d+')':'');

    any=true;
    html+='<div class="supp-note-row"><span class="sntime">'+t+'</span><span class="snitems">';
    byTiming[t].forEach(function(item,i){

      }
      if(i<byTiming[t].length-1)html+=' ';
    });
    html+='</span></div>';
  });
  html+='</div>';
  el.innerHTML=any?html:'';
}

function upd(k,v){

  if(k==='formula'||k==='lbm'){renderMain();return;}

    if(eaEl){eaEl.className=eaCls;eaEl.innerHTML=eaTxt;}

  // Refresh MET totals if weight changed (kcal depends on weight)
  if(k==='weight'){var mw=document.querySelector('.met-wrap');if(mw&&(c.metActivities||[]).length>0){var mt=buildMetHtml(c,t);var tmp=document.createElement('div');tmp.innerHTML=mt;var newMet=tmp.firstChild;if(newMet)mw.parentNode.replaceChild(newMet,mw);}}

      +'<div class="hydration-chip" style="background:#fff3e0;color:#e65100">&#128197; '+numT+'/7 ημέρες προπόνησης</div>';
  }
  // Keep day-target inputs in sync when no custom targets set
  if(!c.dayTargets){
    var defs=makeDayTgtDefaults(c,t);

  }

// Replaces expandable FYH recipe entries with their actual ingredients (scaled to portion)
function expandFYHRecipes(days){
  var result=JSON.parse(JSON.stringify(days));
  result.forEach(function(meals){
    meals.forEach(function(meal){
      var expanded=[];
      meal.foods.forEach(function(food){
        var rx=FYH_RECIPE_EXPAND[food.n];
        if(rx){
          var scale=food.g/rx.base;
          rx.ing.forEach(function(ing){
            expanded.push({n:ing.n,g:Math.round(ing.g*scale)});
          });
        } else {
          expanded.push(food);
        }
      });
      meal.foods=expanded;
    });
  });
  return result;
}

function ensureSaladAndOil(days){
  var result=JSON.parse(JSON.stringify(days));
  result.forEach(function(meals){
    meals.forEach(function(meal){
      if(meal.name!=='Μεσημεριανό'&&meal.name!=='Βραδινό')return;

      var hasFYH=meal.foods.some(function(f){return FYH_COMPLETE_MEAL[f.n];});
      if(hasFYH)return;
      var hasSalad=meal.foods.some(function(f){return f.n==='Σαλάτα εποχής';});
      if(!hasSalad)meal.foods.push({n:'Σαλάτα εποχής',g:100});

      if(!hasOil)meal.foods.push({n:'Ελαιόλαδο',g:10});
    });

}

// ── Mediterranean weekly structure ───────────────────────────────────────────
// ΜΕΣΗΜΕΡΙΑΝΑ
//   Δευ: Ρεβίθια+Τόνος+Σαλάτα+Λάδι (fixed)
//   Τρί: Κοτόπουλο σχάρας (swap, template sides)
//   Τετ: Κοτόπουλο μπιφτέκι (swap, template sides)
//   Πέμ: Φακές+Τόνος+Σαλάτα+Λάδι (fixed)
//   Παρ: Κοτόπουλο σχάρας (swap, template sides)
//   Σαβ: Λαβράκι+Κινόα+Σαλάτα+Λάδι (fixed)
//   Κυρ: Χοιρινό μπριζόλα+Πατάτα+Γιαούρτι+Σαλάτα+Λάδι (fixed)

//   Τρί: Λαβράκι+Ρύζι καστανό+Σαλάτα+Λάδι (fixed)
//   Τετ: Βοδινά φιλετάκια+Γλυκοπατάτα+Σαλάτα+Λάδι+Γιαούρτι (fixed)
//   Παρ: Πίτα+Κοτόπουλο+Γιαούρτι+Σαλάτα+Λάδι (σουβλάκι) (fixed)
//   Σαβ: Ελεύθερο γεύμα (free)
var MED_PLAN={
  0:{Μεσημεριανό:{type:'fixed', foods:[

    {n:'Γιαούρτι 2%',g:150},{n:'Σαλάτα εποχής',g:100},{n:'Ελαιόλαδο',g:10}
  ]}}
};
var PROT_CATS=['Κρέας','Ψάρια','Αυγά/Γαλακτ.','Όσπρια'];
var GRAIN_CATS=['Δημητριακά'];

function applyMediterraneanRules(days){
  var result=JSON.parse(JSON.stringify(days));
  Object.keys(MED_PLAN).forEach(function(di){
    var dayIdx=parseInt(di);
    var rules=MED_PLAN[di];
    if(!result[dayIdx])return;
    result[dayIdx].forEach(function(meal){
      var rule=rules[meal.name];
      if(!rule)return;
      // Skip FYH complete meals
      if(meal.foods.some(function(f){return FYH_COMPLETE_MEAL[f.n];}))return;
      // Find existing protein gram amount (to keep similar quantity after scaling)
      var existG=150;
      meal.foods.forEach(function(f){
        var cat=FOODS[f.n]?FOODS[f.n].cat:'';
        if(PROT_CATS.indexOf(cat)!==-1)existG=f.g;
      });
      if(rule.type==='free'){
        // Free meal — replace with marker, pipeline steps skip this meal
        meal.foods=[{n:FREE_MEAL_MARKER,g:0}];
      } else if(rule.type==='fixed'){
        // Replace entire meal with the fixed meal foods
        meal.foods=JSON.parse(JSON.stringify(rule.foods));
      } else if(rule.type==='legumes'){
        // Remove proteins and grains; replace with legume (+ tuna if specified)
        var keep=meal.foods.filter(function(f){
          var cat=FOODS[f.n]?FOODS[f.n].cat:'';
          return PROT_CATS.indexOf(cat)===-1&&GRAIN_CATS.indexOf(cat)===-1
            &&f.n!=='Σαλάτα εποχής'&&f.n!=='Ελαιόλαδο';
        });
        var legBase=[{n:rule.leg,g:200}];
        if(rule.tuna)legBase.push({n:rule.tuna,g:80});
        meal.foods=legBase.concat(keep);
      } else {
        // Swap protein food(s) with target protein
        var swapped=false;
        meal.foods=meal.foods.map(function(f){
          var cat=FOODS[f.n]?FOODS[f.n].cat:'';
          if(PROT_CATS.indexOf(cat)!==-1&&!swapped){swapped=true;return{n:rule.n,g:f.g};}
          if(PROT_CATS.indexOf(cat)!==-1&&swapped)return null; // remove duplicates
          return f;
        }).filter(function(f){return f!==null;});
      }
    });
  });
  return result;
}

// Swap refined grains for whole-grain Mediterranean equivalents
var MED_GRAIN_SWAP={
  'Ρύζι άσπρο (βρ.)':'Ρύζι καστανό (βρ.)',
  'Μακαρόνια (βρ.)': 'Πλιγούρι (βρ.)',
  'Κριθαράκι (βρ.)': 'Κινόα (βρ.)',

};
function preferWholeGrains(days){
  var result=JSON.parse(JSON.stringify(days));
  result.forEach(function(meals){
    meals.forEach(function(meal){
      if(meal.foods.some(function(f){return FYH_COMPLETE_MEAL[f.n];}))return;
      meal.foods=meal.foods.map(function(f){
        var s=MED_GRAIN_SWAP[f.n];
        return s?{n:s,g:f.g}:f;
      });
    });
  });
  return result;
}

// Remove side dishes from meals that already contain a complete FYH recipe
function cleanFYHMeals(days){
  var result=JSON.parse(JSON.stringify(days));
  result.forEach(function(meals){
    meals.forEach(function(meal){
      var hero=null;
      meal.foods.forEach(function(f){if(FYH_COMPLETE_MEAL[f.n])hero=f;});
      if(hero&&meal.foods.length>1)meal.foods=[hero];
    });
  });
  return result;
}

// ── Πατάτα σε γεύματα ψαριού (δεν έχουν υδατάνθρακα) ────────────────────────
function addPotatoToFishMeals(days){
  var result=JSON.parse(JSON.stringify(days));
  result.forEach(function(meals){
    meals.forEach(function(meal){
      if(meal.name!=='Μεσημεριανό'&&meal.name!=='Βραδινό')return;
      if(meal.foods.some(function(f){return f.n===FREE_MEAL_MARKER;}))return;
      // Έλεγχος αν το γεύμα περιέχει ψάρι
      var hasFish=meal.foods.some(function(f){
        return FOODS[f.n]&&FOODS[f.n].cat==='Ψάρια';
      });
      if(!hasFish)return;
      // Έλεγχος αν υπάρχει ήδη υδατάνθρακας (δημητριακά ή πατάτα)
      var hasCarb=meal.foods.some(function(f){
        if(f.n==='Πατάτες')return true;
        return FOODS[f.n]&&FOODS[f.n].cat==='Δημητριακά';
      });
      if(!hasCarb)meal.foods.push({n:'Πατάτες',g:200});
    });
  });
  return result;
}

// ── Standardize Mediterranean snacks ─────────────────────────────────────────
// Every Ενδιάμεσο should have at least 1 fruit AND 1 nuts/dairy item
// Skip snacks that already contain a FYH snack item
var FYH_SNACK_NAMES={
  'Dark Choc Oat Bites':1,'Energy Bites (FYH)':1,'PB Coconut Truffles':1,
  'PB Protein Bars':1,'Muffins Μύρτιλου':1,'Γκρανόλα χωρίς ζάχαρη':1,
  'Protein Pancakes (FYH)':1,'Μπανανόψωμο':1
};
var MED_SNACK_FRUITS=['Μήλο','Μπανάνα','Πορτοκάλι','Αχλάδι','Ροδάκινο'];
var MED_SNACK_NUTS=['Καρύδια','Αμύγδαλα','Κάσιους','Φυστίκι Αιγίνης'];
var FRUIT_CAT=['Φρούτα'];
var NUTS_CATS=['Λιπαρά','Ξηροί καρποί'];

function standardizeMediterraneanSnacks(days){
  var result=JSON.parse(JSON.stringify(days));
  result.forEach(function(meals,di){
    meals.forEach(function(meal){
      if(meal.name!=='Ενδιάμεσο')return;
      // Skip if has FYH snack item
      if(meal.foods.some(function(f){return FYH_SNACK_NAMES[f.n];}))return;
      // Check for fruit
      var hasFruit=meal.foods.some(function(f){
        var cat=FOODS[f.n]?FOODS[f.n].cat:'';
        return FRUIT_CAT.indexOf(cat)!==-1;
      });
      // Check for nuts/dairy
      var hasNuts=meal.foods.some(function(f){
        var cat=FOODS[f.n]?FOODS[f.n].cat:'';
        return NUTS_CATS.indexOf(cat)!==-1||cat==='Αυγά/Γαλακτ.';
      });
      // Add fruit if missing — rotate through week
      if(!hasFruit){
        var fruitName=MED_SNACK_FRUITS[di%MED_SNACK_FRUITS.length];
        meal.foods.unshift({n:fruitName,g:150});
      }
      // Add nuts if missing
      if(!hasNuts){
        meal.foods.push({n:'Καρύδια',g:15});
      }
    });
  });
  return result;
}

// ── Normalize breakfasts: eggs Mon/Wed/Fri, yogurt+oats other days ────────────
var EGG_DAYS={0:1,2:1,4:1}; // Mon=0, Wed=2, Fri=4
var MED_BRK_FRUITS=['Μήλο','Μπανάνα','Πορτοκάλι','Ροδάκινο','Αχλάδι'];

function normalizeBreakfasts(days){
  var result=JSON.parse(JSON.stringify(days));
  result.forEach(function(meals,di){
    var brkIdx=-1;
    meals.forEach(function(meal,mi){if(meal.name==='Πρωινό')brkIdx=mi;});
    if(brkIdx===-1)return;
    var meal=meals[brkIdx];
    // Κυριακή: πάντα Pancakes Κυριακής (FYH) — εκτός αν υπάρχουν ήδη
    if(di===6){
      if(!meal.foods.some(function(f){return f.n==='Pancakes Κυριακής (FYH)';}))
        meal.foods=[{n:'Pancakes Κυριακής (FYH)',g:135}];
      return;
    }
    // Skip FYH breakfasts (άλλες μέρες)
    if(meal.foods.some(function(f){return FYH_COMPLETE_MEAL[f.n]||FYH_SNACK_NAMES[f.n];}))return;
    var hasEgg=meal.foods.some(function(f){
      return f.n==='Αυγά (ολόκληρα)'||f.n==='Ασπράδια αυγών';
    });
    var hasYogurt=meal.foods.some(function(f){
      return f.n==='Γιαούρτι 2%'||f.n==='Γιαούρτι 0%'||f.n==='Κεφίρ';
    });
    var fruit=MED_BRK_FRUITS[di%MED_BRK_FRUITS.length];
    if(EGG_DAYS[di]){
      // Egg days → Πρωινό Αυγών (FYH): expands to αυγά+ψωμί+αβοκάντο via expandFYHRecipes (step 8)
      if(!hasEgg){
        meal.foods=[
          {n:'Πρωινό Αυγών (FYH)',g:200},
          {n:fruit,g:150}
        ];
      }
    } else {
      // Should be yogurt/oat-based
      if(!hasYogurt){
        meal.foods=[
          {n:'Γιαούρτι 2%',g:200},
          {n:'Βρώμη (ωμή)',g:40},
          {n:fruit,g:150},
          {n:'Καρύδια',g:15}
        ];
      }
    }
  });
  return result;
}

// ── Mediterranean compliance score ────────────────────────────────────────────
// Checks 7 rules on the generated week plan; returns {score, rules}
var MED_SCORE_RULES=[
  {id:'fish',   icon:'🐟', label:'Ψάρι ≥2x/εβδ.'},
  {id:'meat',   icon:'🥩', label:'Κόκκινο κρέας ≤2x/εβδ.'},
  {id:'leg',    icon:'🫘', label:'Όσπρια ≥2x/εβδ.'},
  {id:'egg',    icon:'🥚', label:'Αυγά 2-3x/εβδ. πρωί'},
  {id:'oil',    icon:'🫒', label:'Ελαιόλαδο στα κύρια'},
  {id:'salad',  icon:'🥗', label:'Σαλάτα στα κύρια'},
  {id:'grain',  icon:'🌾', label:'Ολικής άλεσης δημητριακά'}
];
var FISH_FOODS=['Σολομός (ψητός)','Λαβράκι (ψητό)','Τόνος (κονσέρβα)','Σαρδέλες','Τσιπούρα (ψητή)','Γαρίδες','Μπακαλιάρος'];
var RED_MEAT_FOODS=['Βοδινό άπαχο (ψητό)','Βοδινά φιλετάκια','Χοιρινό (μπριζόλα)','Μοσχάρι κιμάς','Αρνί'];
var LEGUME_FOODS=['Φακές','Ρεβίθια','Φασόλια','Μαυρομάτικα','Φάβα'];
var REFINED_GRAINS=['Ρύζι άσπρο (βρ.)','Μακαρόνια (βρ.)','Κριθαράκι (βρ.)','Ψωμί λευκό'];

function calcMedScore(weekPlan){
  var fishCount=0,meatCount=0,legCount=0,eggBrkCount=0;
  var oilMainDays=0,saladMainDays=0,refinedFound=false;
  for(var d=0;d<7;d++){
    var meals=weekPlan[d]||[];
    var dayHasOilMain=false,dayHasSaladMain=false;
    meals.forEach(function(meal){
      var isMain=meal.name==='Μεσημεριανό'||meal.name==='Βραδινό';
      var isBrk=meal.name==='Πρωινό';
      meal.foods.forEach(function(f){
        if(FISH_FOODS.indexOf(f.n)!==-1)fishCount++;
        if(RED_MEAT_FOODS.indexOf(f.n)!==-1)meatCount++;
        if(LEGUME_FOODS.indexOf(f.n)!==-1)legCount++;
        if(isBrk&&(f.n==='Αυγά (ολόκληρα)'||f.n==='Ασπράδια αυγών'))eggBrkCount++;
        if(isMain&&f.n==='Ελαιόλαδο')dayHasOilMain=true;
        if(isMain&&(f.n==='Σαλάτα εποχής'))dayHasSaladMain=true;
        if(REFINED_GRAINS.indexOf(f.n)!==-1)refinedFound=true;
      });
    });
    if(dayHasOilMain)oilMainDays++;
    if(dayHasSaladMain)saladMainDays++;
  }
  var results={
    fish: fishCount>=2,
    meat: meatCount<=2,
    leg:  legCount>=2,
    egg:  eggBrkCount>=2&&eggBrkCount<=3,
    oil:  oilMainDays>=5,
    salad:saladMainDays>=5,
    grain:!refinedFound
  };
  var score=Object.keys(results).filter(function(k){return results[k];}).length;
  return{score:score,total:7,results:results};
}

function renderMedScore(weekPlan){
  var s=calcMedScore(weekPlan);
  var pct=Math.round(s.score/s.total*100);
  var scoreColor=pct>=85?'#025857':pct>=57?'#E65100':'#c62828';

    +'<div style="display:flex;align-items:center;gap:8px;flex-shrink:0">'
    +'<span style="font-size:18px">🫒</span>'
    +'<span style="font-size:11px;font-weight:700;color:#555">Μεσογειακή Βαθμολογία</span>'
    +'<span style="font-size:20px;font-weight:800;color:'+scoreColor+'">'+s.score+'/'+s.total+'</span>'
    +'<span style="font-size:11px;color:'+scoreColor+';font-weight:700">'+pct+'%</span>'
    +'</div>'
    +'<div style="display:flex;flex-wrap:wrap;gap:5px;flex:1">';
  MED_SCORE_RULES.forEach(function(r){
    var ok=s.results[r.id];
    var bg=ok?'#E2EEE5':'#fce4e4';
    var fc=ok?'#025857':'#c62828';
    var border=ok?'#c5ddd8':'#f5c6c6';

      +r.icon+' '+r.label+(ok?' ✓':' ✗')+'</span>';

function genPlan(){
  var c=getC();if(!c)return;var t=calcTDEE(c);c.weekPlan={};
  var tmpl=TMPLS[c.goal]||TMPLS.maintain;
  if(c.selectedTemplate){
    if(c.selectedTemplate.indexOf('__kcal_')===0){
      var kcalKey=c.selectedTemplate.replace('__kcal_','');
      if(TMPLS[kcalKey])tmpl=TMPLS[kcalKey];
    } else {
      var ct=null;
      customTemplates.forEach(function(x){if(x.id===c.selectedTemplate)ct=x;});
      if(ct)tmpl=ct.days;
    }
  }
  // Build base day array
  var tmplDays=[];
  for(var d=0;d<7;d++)tmplDays.push(tmpl[d]||tmpl[0]);
  var excl=c.foodExclude||[];
  // ── Mediterranean standards pipeline ──────────────────────────
  tmplDays=removeFYHFromMainMeals(tmplDays);           // 0. FYH έξω από κύρια γεύματα (χειροκίνητα)
  tmplDays=preferWholeGrains(tmplDays);                // 1. ολικής άλεσης δημητριακά
  tmplDays=applyMediterraneanRules(tmplDays);          // 2. κατανομή πρωτεΐνης (ψάρι/κρέας/όσπρια)
  tmplDays=cleanFYHMeals(tmplDays);                    // 3. FYH σε snacks = αυτόνομα (safety net)
  tmplDays=ensureSaladAndOil(tmplDays);                // 4. σαλάτα εποχής + ελαιόλαδο παντού
  tmplDays=addPotatoToFishMeals(tmplDays);             // 5. πατάτα σε γεύματα ψαριού
  tmplDays=standardizeMediterraneanSnacks(tmplDays);   // 6. φρούτο + ξηροί καρποί στα ενδιάμεσα
  tmplDays=normalizeBreakfasts(tmplDays);              // 7. Πρωινό Αυγών (FYH) Δευ/Τετ/Παρ, γιαούρτι+βρώμη αλλού
  tmplDays=expandFYHRecipes(tmplDays);                 // 8. ανάπτυξη συνταγών σε συστατικά (για πελάτες)
  if(excl.length)tmplDays=applyFoodExclusions(tmplDays,excl); // 9. αποκλεισμός τροφίμων (μετά όλα τα steps)
  var eff=getDayTgtEff(c,t);
  for(var d=0;d<7;d++)c.weekPlan[d]=scalePlan(tmplDays[d],eff[d]);
  save();swTab(2);renderWeekTable();
}

/* ======== WEEKLY TABLE ======== */
function renderWeekTable(){

  for(var mi=0;mi<numMeals;mi++){

        }
        var hasSrv=PORTIONS[food.n]&&PORTIONS[food.n].length>0;
        var fu=FOOD_UNITS[food.n];
        var chipVal=fu?Math.max(1,Math.round(food.g/fu.g)):food.g;
        var chipMax=fu?10:999;
        var chipUnit=fu?fu.u:'g';
        var chipChg=fu?'updG('+d+','+mi+','+fi+',this.value*'+fu.g+')'

        html+='<div class="food-chip">'

          +' oninput="showChipSug(this)" onfocus="showChipSug(this)" onblur="closeDD()">'

          +(hasSrv?'<button class="chip-srv" onmousedown="event.preventDefault();showPortions(this,'+d+','+mi+','+fi+')">&#8801;</button>':'')

          +'<span class="chip-unit">'+chipUnit+'</span>'
          +(fu&&fu.u==='μερίδ.'?'<span class="chip-ghint">('+food.g+'g)</span>':'')
          +'<button class="chip-del" onclick="delF('+d+','+mi+','+fi+')">&#10005;</button>'
          +'</div>';
        // Recipe ingredients — visible only in print/PDF
        if(FOODS[food.n]&&FOODS[food.n].ingredients){
          html+='<div class="chip-ingredients-print">';
          FOODS[food.n].ingredients.forEach(function(ing){
            var prep=ing.prep?' ('+ing.prep+')':'';

          html+='</div>';
        }
      });
      var mK2=0,mP2=0,mF2=0,mC2=0,mFi2=0;
      foods.forEach(function(f2){var rv=cm(f2.n,f2.g);mK2+=rv.k;mP2+=rv.p;mF2+=rv.f;mC2+=rv.c;mFi2+=rv.fi;});
      if(foods.length){

          +(lowProt?'<span class="prot-warn" title="Χαμηλή πρωτεΐνη — στόχος ≥15g/γεύμα για βέλτιστη MPS">⚠️</span>':'')

          +'<span style="color:#B71C1C">F:'+Math.round(mF2)+'</span> '
          +'<span style="color:#2E7D32">C:'+Math.round(mC2)+'</span>'
          +(mFi2>=0.5?' <span style="color:#795548" title="Φυτικές ίνες">· 🌾'+mFi2.toFixed(1)+'g</span>':'')

      }

        +(foods.length?'<button class="combo-save-btn" onclick="saveCombo('+d+','+mi+')" title="Αποθήκευση γεύματος ως συνδυασμό">💾 Αποθήκευση</button>':'')

  // Totals row

    var eff=effTgtArr[d]||{k:tdeeR.target,p:tdeeR.p,f:tdeeR.f,c:tdeeR.carb};

    var trainBadge=trainD[d]?'<span style="font-size:9px;font-weight:700;color:#025857"> T</span>':'';
    // Macro bar helper
    function mBar(actual,target,color){
      var pctW=target?Math.min(100,Math.round(actual/target*100)):100;
      var barColor=pctW<80?'#e67e22':pctW>115?'#c0392b':color;
      return '<div style="width:'+pctW+'%;background:'+barColor+'" class="macro-bar-fill"></div>';

    function mVal(actual,target){return actual&&target?(actual/target<0.8?'#e67e22':actual/target>1.15?'#c0392b':'#555'):'#555';}
    var fiPct=fiberDayTgt?tFi/fiberDayTgt:1;
    var fiValColor=fiPct<0.65?'#B71C1C':fiPct<0.85?'#e67e22':'#5d4037';
    html+='<td>'
      +'<div class="tot-kcal '+kCls+'">'+Math.round(tK)+' / '+eff.k+' kcal '+kPct+'%'+trainBadge+'</div>'

        +'<span class="mbr-label" style="color:#1565C0">Π</span>'
        +'<div class="macro-bar">'+mBar(tP,eff.p,'#1565C0')+'</div>'
        +'<span class="mbr-val" style="color:'+mVal(tP,eff.p)+'">'+Math.round(tP)+'/'+Math.round(eff.p)+'g</span>'
      +'</div>'
      +'<div class="macro-bar-row">'
        +'<span class="mbr-label" style="color:#e65100">Λ</span>'
        +'<div class="macro-bar">'+mBar(tF,eff.f,'#e65100')+'</div>'
        +'<span class="mbr-val" style="color:'+mVal(tF,eff.f)+'">'+Math.round(tF)+'/'+Math.round(eff.f)+'g</span>'
      +'</div>'
      +'<div class="macro-bar-row">'
        +'<span class="mbr-label" style="color:#2e7d32">Υ</span>'
        +'<div class="macro-bar">'+mBar(tC,eff.c,'#2e7d32')+'</div>'
        +'<span class="mbr-val" style="color:'+mVal(tC,eff.c)+'">'+Math.round(tC)+'/'+Math.round(eff.c)+'g</span>'
      +'</div>'

        +'<span class="mbr-label" style="color:#5d4037">Ί</span>'
        +'<div class="macro-bar">'+mBar(tFi,fiberDayTgt,'#795548')+'</div>'
        +'<span class="mbr-val" style="color:'+fiValColor+'">'+tFi.toFixed(1)+'/'+fiberDayTgt+'g</span>'
      +'</div>'
      +'</td>';
  }
  html+='</tr></tbody></table>';

  // ── Tuna frequency check (mercury risk) ─────────────────────────────────────

      m.foods.forEach(function(f){if(/τόνο/i.test(f.n))tunaCount++;});
    });

      +'🐟 <b>Προσοχή — Τόνος:</b> εμφανίζεται <b>'+tunaCount+'x</b> αυτή την εβδομάδα.'
      +(isMinorTW?' Για ανηλίκους το ανώτατο όριο EFSA (2015) είναι <b>≤2 μερίδες/εβδ.</b> λόγω μεθυλυδραργύρου.'
               :' Συνίσταται <b>max 3-4 μερίδες/εβδ.</b> (EFSA 2015 — μεθυλυδράργυρος).')
      +'</div>';

  // ── Weekly fiber summary banner ────────────────────────────────────────────

    var dc=dPct>=90?'#4CAF50':dPct>=65?'#FF9800':'#F44336';
    dotHtml+='<span title="'+dn+': '+dp.toFixed(1)+'g ('+dPct+'%)" style="display:inline-flex;flex-direction:column;align-items:center;gap:2px;cursor:default">'
      +'<span style="display:inline-block;width:9px;height:9px;border-radius:50%;background:'+dc+'"></span>'

    +'</span>';
  });

    +'<span style="font-size:10px;color:#888">/ '+wkFiTgt+'g στόχος &nbsp;·&nbsp; <b style="color:'+wkFiTxtColor+'">'+wkFiPct+'%</b></span>'
    +'<div style="flex:1;min-width:80px;height:6px;background:#e4e4e4;border-radius:3px;overflow:hidden">'
      +'<div style="width:'+Math.min(100,wkFiPct)+'%;height:100%;background:'+wkFiColor+';border-radius:3px;transition:width .3s"></div>'
    +'</div>'
    +'<div style="display:flex;gap:5px;align-items:center">'+dotHtml+'</div>'
    +(wkFiPct<65?'<span style="font-size:10px;color:#B71C1C;font-weight:600">⚠ Χαμηλή πρόσληψη ινών — στόχος '+getFiberTarget(c.age,c.sex)+'g/ημ. (DRI AI)</span>':'')

function updG(d,mi,fi,v){var c=getC();if(!c)return;c.weekPlan[d][mi].foods[fi].g=Math.max(0,parseInt(v)||0);save();renderWeekTable();}
function addF(d,mi){var c=getC();if(!c)return;c.weekPlan[d][mi].foods.push({n:Object.keys(FOODS)[0],g:100});save();renderWeekTable();}
function delF(d,mi,fi){var c=getC();if(!c)return;c.weekPlan[d][mi].foods.splice(fi,1);save();renderWeekTable();}
function copyDayPrompt(btn,fromDay){
  var c=getC();if(!c||!c.weekPlan[fromDay]||!c.weekPlan[fromDay].length)return;
  var dayNames=['Δευ','Τρι','Τετ','Πεμ','Παρ','Σαβ','Κυρ'];
  var panelId='copy-panel-'+fromDay;
  var existing=document.getElementById(panelId);
  if(existing){existing.remove();return;}
  // Close any other open copy panels
  document.querySelectorAll('[id^="copy-panel-"]').forEach(function(p){p.remove();});
  var rect=btn.getBoundingClientRect();
  var panel=document.createElement('div');
  panel.id=panelId;
  panel.style.cssText='position:fixed;z-index:9999;background:#fff;border:1px solid #025857;border-radius:8px;padding:10px 12px;box-shadow:0 4px 18px rgba(0,0,0,.18);font-size:11px;min-width:165px;left:'+Math.round(rect.left)+'px;top:'+Math.round(rect.bottom+4)+'px';
  var inner='<div style="font-weight:700;color:#025857;margin-bottom:7px">📋 Αντιγραφή '+dayNames[fromDay]+' σε:</div>';
  inner+='<div style="display:flex;flex-direction:column;gap:5px">';
  for(var di=0;di<7;di++){
    if(di===fromDay)continue;
    inner+='<label style="display:flex;align-items:center;gap:6px;cursor:pointer">'
      +'<input type="checkbox" id="cp-'+di+'" style="accent-color:#025857"> '+dayNames[di]+'</label>';
  }
  inner+='</div><div style="display:flex;gap:6px;margin-top:8px">'
    +'<button onclick="doCopyDay('+fromDay+')" style="flex:1;padding:4px;background:#025857;color:#fff;border:none;border-radius:5px;font-size:11px;cursor:pointer">✓ Εφαρμογή</button>'
    +'<button onclick="document.getElementById(\''+panelId+'\').remove()" style="padding:4px 8px;border:1px solid #ddd;border-radius:5px;font-size:11px;cursor:pointer;background:#fff">✕</button>'
    +'</div>';
  panel.innerHTML=inner;
  document.body.appendChild(panel);
  // Close on outside click
  setTimeout(function(){
    function outsideClick(e){if(!panel.contains(e.target)&&e.target!==btn){panel.remove();document.removeEventListener('mousedown',outsideClick);}}
    document.addEventListener('mousedown',outsideClick);
  },0);
}
function doCopyDay(fromDay){
  var c=getC();if(!c)return;
  var dayNames=['Δευ','Τρι','Τετ','Πεμ','Παρ','Σαβ','Κυρ'];
  var copied=[];
  for(var di=0;di<7;di++){
    var cb=document.getElementById('cp-'+di);
    if(cb&&cb.checked){c.weekPlan[di]=JSON.parse(JSON.stringify(c.weekPlan[fromDay]));copied.push(dayNames[di]);}
  }
  if(!copied.length){alert('Δεν επιλέχθηκε καμία ημέρα.');return;}
  save();renderWeekTable();
}

/* ---- Chip food search ---- */
function closeDD(){if(currentDD){currentDD.remove();currentDD=null;}}

function showChipSug(inp){
  closeDD();
  var q=inp.value.toLowerCase().trim();
  var keys=Object.keys(FOODS);
  var matches=q?keys.filter(function(n){return n.toLowerCase().indexOf(q)>=0;}):keys;
  if(!matches.length)return;
  var d=inp.dataset.d,mi=inp.dataset.mi,fi=inp.dataset.fi,mode=inp.dataset.mode||'';
  var html='';
  matches.forEach(function(n){
    html+='<div class="chip-ddi" data-n="'+n+'" data-d="'+d+'" data-mi="'+mi+'" data-fi="'+fi+'" data-mode="'+mode+'" onmousedown="event.preventDefault();pickChip(this)">'
      +'<span>'+n+'</span><span class="chip-ddm">'+FOODS[n].k+' kcal</span></div>';
  });
  var dd=document.createElement('div');dd.className='chip-dd';dd.innerHTML=html;
  inp.parentElement.appendChild(dd);currentDD=dd;
}

function pickChip(el){

/* ---- Saved Combos ---- */
function getSavedCombos(){try{return JSON.parse(localStorage.getItem('dieto_combos')||'[]');}catch(e){return[];}}
function setSavedCombos(arr){localStorage.setItem('dieto_combos',JSON.stringify(arr));}

function saveCombo(d,mi){
  var c=getC();if(!c)return;
  var meal=c.weekPlan[d]&&c.weekPlan[d][mi];
  if(!meal||!meal.foods||!meal.foods.length){alert('Δεν υπάρχουν τρόφιμα για αποθήκευση.');return;}
  var name=prompt('Όνομα συνδυασμού:',meal.name||'');
  if(!name||!name.trim())return;
  var combos=getSavedCombos();
  combos.push({id:'c'+Date.now(),name:name.trim(),foods:JSON.parse(JSON.stringify(meal.foods))});
  setSavedCombos(combos);
  renderFoodLib('');
}

function deleteCombo(id){
  if(!confirm('Διαγραφή συνδυασμού;'))return;
  setSavedCombos(getSavedCombos().filter(function(x){return x.id!==id;}));
  renderFoodLib('');
}

/* ---- Food library ---- */
function renderFoodLib(q){
  var el=document.getElementById('lib-list');if(!el)return;
  q=(q||'').toLowerCase().trim();

  // ── Saved combos section (shown only when not searching) ──
  var comboHtml='';
  if(!q){
    var combos=getSavedCombos();
    comboHtml='<div class="combo-section">'
      +'<div class="combo-sec-title">📋 Αποθηκευμένοι Συνδυασμοί</div>';
    if(!combos.length){
      comboHtml+='<div style="font-size:10px;color:#bbb;padding:2px 4px 4px">Κανένας ακόμα — πάτα 💾 σε γεύμα</div>';
    } else {
      combos.forEach(function(combo){
        var cid=combo.id.replace(/'/g,"\\'");
        var preview=combo.foods.slice(0,3).map(function(f){return f.n;}).join(', ')+(combo.foods.length>3?' +':'');
        comboHtml+='<div class="combo-item" draggable="true" data-combo="'+combo.id+'">'
          +'<span class="combo-name">'+combo.name+'</span>'
          +'<span class="combo-count">'+combo.foods.length+'</span>'
          +'<button class="combo-del" onclick="deleteCombo(\''+cid+'\')" title="Διαγραφή">&times;</button>'
          +'</div>'
          +'<div class="combo-preview">'+preview+'</div>';
      });
    }
    comboHtml+='</div>';
  }

  var cats={};
  Object.keys(FOODS).forEach(function(n){
    if(q&&n.toLowerCase().indexOf(q)<0)return;
    var cat=FOODS[n].cat;if(!cats[cat])cats[cat]=[];cats[cat].push(n);
  });
  if(!Object.keys(cats).length){el.innerHTML=comboHtml+'<div style="color:#bbb;font-size:11px;padding:6px">Δεν βρέθηκε</div>';return;}
  var html=comboHtml;
  Object.keys(cats).sort().forEach(function(cat){
    html+='<div class="lib-cat">'+cat+'</div>';
    cats[cat].forEach(function(n){
      var hasIng=FOODS[n].ingredients?'<button class="lib-recipe-btn" onclick="showRecipeModal(\''+n.replace(/'/g,"\\'")+'\')" title="Δείτε τα συστατικά">📖</button>':'';
      html+='<div class="lib-item" draggable="true" data-food="'+n+'"><span>'+n+'</span>'+hasIng+'<span class="lib-kcal">'+FOODS[n].k+'</span></div>';
    });
  });
  el.innerHTML=html;
  // Drag: saved combos
  el.querySelectorAll('.combo-item').forEach(function(item){
    item.addEventListener('dragstart',function(e){
      e.dataTransfer.setData('text/plain','combo:'+item.dataset.combo);
      e.dataTransfer.effectAllowed='copy';
      setTimeout(function(){item.classList.add('dragging');},0);
    });
    item.addEventListener('dragend',function(){item.classList.remove('dragging');});
  });
  // Drag: foods
  el.querySelectorAll('.lib-item').forEach(function(item){
    item.addEventListener('dragstart',function(e){
      e.dataTransfer.setData('text/plain',item.dataset.food);
      e.dataTransfer.effectAllowed='copy';
      setTimeout(function(){item.classList.add('dragging');},0);
    });
    item.addEventListener('dragend',function(){item.classList.remove('dragging');});
  });
}

function exportPDF(lang){

  if(!c||!Object.keys(c.weekPlan||{}).length){alert(isEn?'Create a plan first!':'Πρώτα δημιούργησε πλάνο!');return;}

  // Translation helpers
  function fn(name){return (isEn&&EN_FOOD_NAMES[name])||name;}       // food name
  function tMn(name){return (isEn&&EN_MEAL_NAMES[name])||name;}      // meal name

  function tc(cat){return (isEn&&EN_CAT_NAMES[cat])||cat;}            // category name
  var goalL=isEn
    ?{mild:'Mild Weight Loss',loss:'Weight Loss',maintain:'Maintenance',gain:'Muscle Gain'}
    :{mild:'Ήπια απώλεια',loss:'Απώλεια βάρους',maintain:'Διατήρηση',gain:'Αύξηση μάζας'};
  var actL=isEn
    ?{sed:'Sedentary',light:'Lightly Active',mod:'Moderately Active',active:'Highly Active'}
    :{sed:'Καθιστικός',light:'Ελαφρά ενεργός',mod:'Μέτρια ενεργός',active:'Έντονα ενεργός'};
  var numTDays=(c.trainDays||[]).filter(function(x){return x;}).length;
  var hydBase=t.hydBase||Math.round(c.weight*35);
  var hydTrain=t.hydTrain||Math.round(hydBase+(c.trainHoursPerDay||1)*500);
  var hydStr=isEn
    ?'Hydration – Rest: '+hydBase+'ml  /  Training: '+hydTrain+'ml'
    :'Ενυδάτωση Ανάπαυση: '+hydBase+'ml  /  Προπόνηση: '+hydTrain+'ml';

  // logo via canvas (larger, crisp)
  var logoSrc='';
  try{
    var lc2=document.createElement('canvas');lc2.width=120;lc2.height=120;
    var lx2=lc2.getContext('2d');
    lx2.fillStyle='#e5e5e5';lx2.fillRect(0,0,120,120);
    lx2.fillStyle='#025857';lx2.font='bold 54px Georgia,serif';
    lx2.textAlign='center';lx2.textBaseline='middle';lx2.fillText('fyh',60,60);
    logoSrc=lc2.toDataURL('image/png');
  }catch(e){}

  var isMinorPdf=(c.age||0)<18;
  var mealNames=(c.weekPlan[0]||[]).map(function(m){return m.name;});
  var dayFull=isEn
    ?['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday']
    :['Δευτέρα','Τρίτη','Τετάρτη','Πέμπτη','Παρασκευή','Σάββατο','Κυριακή'];
  // Detect meal type from name
  function mealType(name){
    var n=(name||'').toLowerCase();
    if(n.indexOf('πρω')>-1||n.indexOf('reakfast')>-1)return'b';
    if(n.indexOf('εσημ')>-1||n.indexOf('unch')>-1)return'l';
    if(n.indexOf('ραδ')>-1||n.indexOf('inner')>-1)return'd';
    return's';
  }
  var kidsSnackIdx=0;
  var kidsSnackIcons=['🍎','🥛'];

  // ── Day header row ──────────────────────────────────────────────────────────
  var kDayColors=['#FF6B35','#FFD166','#06D6A0','#118AB2','#EF476F','#9B5DE5','#FF6B35'];
  var thead='<tr><th class="th-corner">'+(isEn?'Meal':'Γεύμα')+'</th>';
  for(var hd=0;hd<7;hd++){

    } else {
      thead+='<th style="background:linear-gradient(160deg,#025857,#037a7a);color:#fff;">'+esc(dayFull[hd])+tb+'<br><span class="dkcal">'+Math.round(hdK)+' kcal</span></th>';
    }
  }
  thead+='</tr>';

  // ── Meal rows (label cell + content) ────────────────────────────────────────
  var tbody='';
  var kidsIcons={b:'🌅',l:'🥗',d:'🌙',s:null};

    var mt=mealType(mealNames[mi]);

      var ico=(mt==='s')?kidsSnackIcons[kidsSnackIdx++%kidsSnackIcons.length]:kidsIcons[mt];

    } else {
      tbody+='<td class="mlbl"><span class="mlbl-txt">'+mLabel+'</span></td>';
    }
    // 7 day cells
    for(var dd=0;dd<7;dd++){
      var fds=(c.weekPlan[dd]&&c.weekPlan[dd][mi])?c.weekPlan[dd][mi].foods:[];
      var mK=0;var ch='';
      fds.forEach(function(fd){
        var mv=cm(fd.n,fd.g);mK+=mv.k;
        if(fd.n===FREE_MEAL_MARKER){ch+='<div class="free">🎉 '+(isEn?'Free Meal':'Ελεύθερο')+'</div>';return;}
        var fu=FOOD_UNITS[fd.n];
        var pdMain='',pdSub='';
        var g_=isEn?'g':'γρ.';
        if(!fu){
          pdMain=fd.g+g_;
        }else{
          var pdN=fd.g/fu.g;
          var pdR=Math.round(pdN*4)/4;
          var pdW=Math.floor(pdR),pdF=pdR-pdW;
          var pdS=pdW>0?''+pdW:'';
          if(Math.abs(pdF-0.25)<0.01)pdS+='¼';
          else if(Math.abs(pdF-0.5)<0.01)pdS+='½';
          else if(Math.abs(pdF-0.75)<0.01)pdS+='¾';
          var isVol=(fu.u==='φλ.'||fu.u==='κ.σ.'||fu.u==='κ.γ.');
          var isCpd=/^[\d½¼¾]/.test(fu.u);
          var fu_u=tu(fu.u);
          if(isVol){
            pdMain=fd.g+g_;
            if(pdS)pdSub='(~'+pdS+' '+fu_u+')';
          }else if(isCpd){
            if(pdS&&Math.abs(pdR-1)<0.2){pdMain=fu_u;pdSub='('+fd.g+g_+')';}
            else if(pdS){pdMain=pdS+'× '+fu_u;pdSub='('+fd.g+g_+')';}
            else{pdMain=fd.g+g_;}
          }else{
            if(pdS){pdMain=pdS+' '+fu_u;pdSub='('+fd.g+g_+')';}
            else{pdMain=fd.g+g_;}
          }
        }
        ch+='<div class="fr"><span class="fn">'+esc(fn(fd.n))+'</span>'

          +'</div>';

  for(var dm=0;dm<7;dm++){

  tbody+='</tr>';

  // ── Supplements ─────────────────────────────────────────────────────────────
  var suppHtml='';
  if(c.supps&&c.supps.length){
    if(!c.suppExclude)c.suppExclude=[];
    var sByT={};
    SUPP_TIMINGS.forEach(function(tm){sByT[tm]=[];});

      suppHtml+='<table class="st"><thead><tr><th class="st-t">'+(isEn?'Timing':'Χρόνος Λήψης')+'</th><th>'+(isEn?'Supplements &amp; Dosage':'Συμπληρώματα &amp; Δοσολογία')+'</th></tr></thead><tbody>';

        suppHtml+='<tr'+(salt?' class="alt"':'')+'><td class="st-t">'+esc(tm)+'</td><td>'+esc(sByT[tm].join('   •   '))+'</td></tr>';
        salt=!salt;
      });
      suppHtml+='</tbody></table>';
    }
  }

  // ── Fruit Exchange List ──────────────────────────────────────────────────────

    {n:'Ανανάς',     por:'3/4 φλιτζάνι',            porEn:'3/4 cup',                g:116},
    {n:'Αχλάδι',     por:'1 μικρό',                  porEn:'1 small',                g:110},

/* ---- RTF export (landscape table, fixed Greek encoding) ---- */
function escRtf(s){
  if(!s)return'';
  var o='';
  for(var i=0;i<s.length;i++){
    var code=s.charCodeAt(i);
    if(s[i]==='\\')o+='\\\\';
    else if(s[i]==='{')o+='\\{';
    else if(s[i]==='}')o+='\\}';
    else if(code>127)o+='\\uc0\\u'+code+' ';
    else o+=s[i];
  }
  return o;
}
