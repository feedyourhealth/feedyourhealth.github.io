<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <title>Dietologist Cloud - Login (Debug)</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #025857 0%, #037070 100%);
      font-family: Arial, sans-serif;
    }
    .container {
      background: white;
      padding: 50px;
      border-radius: 12px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.3);
      width: 90%;
      max-width: 400px;
    }
    .header {
      text-align: center;
      margin-bottom: 30px;
    }
    .logo { font-size: 48px; margin-bottom: 10px; }
    .title { font-size: 24px; color: #025857; font-weight: bold; }
    .tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      border-bottom: 2px solid #eee;
    }
    .tab {
      padding: 10px 20px;
      background: none;
      border: none;
      cursor: pointer;
      color: #999;
      font-weight: bold;
      border-bottom: 3px solid transparent;
      margin-bottom: -2px;
    }
    .tab.active {
      color: #025857;
      border-bottom-color: #025857;
    }
    .form { display: none; }
    .form.active { display: block; }
    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 14px;
      box-sizing: border-box;
    }
    input:focus {
      outline: none;
      border-color: #025857;
      box-shadow: 0 0 0 3px rgba(2,88,87,0.1);
    }
    button {
      width: 100%;
      padding: 12px;
      background: #025857;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
      margin-top: 15px;
      font-size: 16px;
    }
    button:hover { background: #037070; }
    .error {
      color: #c62828;
      background: #ffebee;
      padding: 12px;
      border-radius: 6px;
      margin-bottom: 15px;
      font-size: 13px;
      display: none;
    }
    .error.show { display: block; }
    .debug {
      background: #f0f0f0;
      padding: 10px;
      border-radius: 6px;
      margin-top: 20px;
      font-size: 11px;
      font-family: monospace;
      color: #333;
      max-height: 150px;
      overflow-y: auto;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo">🍽️</div>
      <div class="title">Dietologist Cloud</div>
    </div>

    <div class="tabs">
      <button class="tab active" onclick="switchTab('login')">Σύνδεση</button>
      <button class="tab" onclick="switchTab('register')">Δημιουργία</button>
    </div>

    <!-- LOGIN FORM -->
    <div id="login" class="form active">
      <div class="error" id="loginError"></div>
      <input type="text" id="loginUser" placeholder="Όνομα χρήστη" />
      <input type="password" id="loginPass" placeholder="Κωδικός" />
      <button onclick="handleLogin()">Σύνδεση</button>
    </div>

    <!-- REGISTER FORM -->
    <div id="register" class="form">
      <div class="error" id="registerError"></div>
      <input type="text" id="registerUser" placeholder="Όνομα χρήστη" />
      <input type="email" id="registerEmail" placeholder="Email" />
      <input type="password" id="registerPass" placeholder="Κωδικός" />
      <input type="password" id="registerPass2" placeholder="Επιβεβαίωση κωδικού" />
      <button onclick="handleRegister()">Δημιουργία Λογαριασμού</button>
    </div>

    <div class="debug" id="debug">
      <strong>📋 Debug Log:</strong><br>
      <div id="debugLog"></div>
    </div>
  </div>

  <script>
    // Check if logged in on page load
    window.addEventListener('load', function() {
      const currentUser = localStorage.getItem('currentUser');
      if (currentUser) {
        showWelcomePage();
      }
    });

    function showWelcomePage() {
      const user = JSON.parse(localStorage.getItem('currentUser'));
      document.body.innerHTML = `
        <div class="container" style="text-align: center; max-width: 600px;">
          <div style="font-size: 60px; margin-bottom: 20px;">✅</div>
          <h1 style="color: #025857; font-size: 32px; margin-bottom: 10px;">Καλώς ήρθατε!</h1>
          <p style="color: #666; font-size: 18px; margin-bottom: 30px;">Είστε συνδεδεμένοι ως: <strong>${user.username}</strong></p>
          <p style="color: #999; margin-bottom: 30px;">Email: ${user.email}</p>

          <div style="background: #E2EEE5; padding: 20px; border-radius: 8px; margin-bottom: 30px;">
            <p style="color: #025857; font-size: 14px; margin: 0;">✨ Έτοιμο να ξεκινήσετε!</p>
          </div>

          <button onclick="openApp()" style="background: #025857; padding: 14px 30px; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 16px; margin-bottom: 12px; width: 100%;">
            🍽️ Ανοίξε το Dietologist App
          </button>

          <button onclick="logout()" style="background: #ff6b35; padding: 12px 30px; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 16px;">
            🚪 Αποσύνδεση
          </button>
        </div>
      `;
    }

    function openApp() {
      const user = JSON.parse(localStorage.getItem('currentUser'));
      if (!user) {
        alert('Σφάλμα: Δεν είστε συνδεδεμένος');
        return;
      }

      // Redirect to Dietologist app
      alert('🚀 Φορτώνει το Dietologist App...');
      window.location.href = 'Dietologist.html';
    }

    function logout() {
      localStorage.removeItem('currentUser');
      location.reload();
    }

    function log(msg) {
      const logEl = document.getElementById('debugLog');
      const timestamp = new Date().toLocaleTimeString();
      logEl.innerHTML += `[${timestamp}] ${msg}<br>`;
      logEl.parentElement.scrollTop = logEl.parentElement.scrollHeight;
      console.log(msg);
    }

    function switchTab(tab) {
      document.getElementById('login').classList.remove('active');
      document.getElementById('register').classList.remove('active');
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.getElementById(tab).classList.add('active');
      event.target.classList.add('active');
      document.getElementById('loginError').classList.remove('show');
      document.getElementById('registerError').classList.remove('show');
      log(`📌 Switched to: ${tab}`);
    }

    function showError(formType, msg) {
      const errorEl = document.getElementById(formType + 'Error');
      errorEl.textContent = msg;
      errorEl.classList.add('show');
      log(`❌ Error (${formType}): ${msg}`);
    }

    function handleLogin() {
      const user = document.getElementById('loginUser').value.trim();
      const pass = document.getElementById('loginPass').value;

      log(`🔐 Login attempt: user="${user}"`);

      if (!user || !pass) {
        showError('login', 'Συμπληρώστε όλα τα πεδία');
        return;
      }

      const users = JSON.parse(localStorage.getItem('fallback_users') || '{}');
      log(`📦 Users in storage: ${JSON.stringify(Object.keys(users))}`);

      if (!users[user]) {
        showError('login', 'Χρήστης δεν βρέθηκε');
        log(`❌ User "${user}" not found`);
        return;
      }

      if (users[user].password !== pass) {
        showError('login', 'Λάθος κωδικός');
        log(`❌ Wrong password for user "${user}"`);
        return;
      }

      // Login successful
      localStorage.setItem('currentUser', JSON.stringify({
        username: user,
        email: users[user].email,
        id: users[user].id
      }));

      log(`✅ Login successful for "${user}"!`);
      alert('✅ Σύνδεση επιτυχής!');
      window.location.reload();
    }

    function handleRegister() {
      const user = document.getElementById('registerUser').value.trim();
      const email = document.getElementById('registerEmail').value.trim();
      const pass = document.getElementById('registerPass').value;
      const pass2 = document.getElementById('registerPass2').value;

      log(`➕ Register attempt: user="${user}", email="${email}"`);

      if (!user || !email || !pass || !pass2) {
        showError('register', 'Συμπληρώστε όλα τα πεδία');
        return;
      }

      if (pass !== pass2) {
        showError('register', 'Οι κωδικοί δεν ταιριάζουν');
        return;
      }

      if (pass.length < 4) {
        showError('register', 'Ο κωδικός πρέπει να έχει τουλάχιστον 4 χαρακτήρες');
        return;
      }

      const users = JSON.parse(localStorage.getItem('fallback_users') || '{}');

      if (users[user]) {
        showError('register', 'Αυτό το όνομα χρήστη υπάρχει ήδη');
        log(`❌ User "${user}" already exists`);
        return;
      }

      users[user] = {
        id: 'u' + Date.now(),
        username: user,
        email: email,
        password: pass
      };

      localStorage.setItem('fallback_users', JSON.stringify(users));
      log(`✅ User "${user}" registered! Data: ${JSON.stringify(users[user])}`);
      alert('✅ Λογαριασμός δημιουργήθηκε! Συνδεθείτε.');

      document.getElementById('registerUser').value = '';
      document.getElementById('registerEmail').value = '';
      document.getElementById('registerPass').value = '';
      document.getElementById('registerPass2').value = '';
      document.querySelector('.tab').click();
    }

    // Initial log
    log('🚀 App started');
    log(`📦 Current users: ${JSON.stringify(Object.keys(JSON.parse(localStorage.getItem('fallback_users') || '{}')))}`)
  </script>
</body>
</html>
